/* ===== Roster editing (Matrice) ===== */
function rosterIdx(name){ return (ROSTER||[]).findIndex(m=>m.medic===name); }
async function updRoster(name,field,val){
  let i=rosterIdx(name);
  if(i<0){ ROSTER.push({medic:name,fee:0,suma:0}); i=ROSTER.length-1; }
  ROSTER[i][field]=val;
  // reflect in current view map for live totals
  if(VIEW_MED[name]) VIEW_MED[name][field]=val;
  await saveRoster(); applyFilters(); setStatus(true);
}
async function renameRoster(oldName){
  const nn=prompt('Redenumește medicul:',oldName);
  if(!nn||nn.trim()===''||nn.trim()===oldName) return;
  const newName=nn.trim();
  if(rosterIdx(newName)>=0){ toast('Există deja un medic cu acest nume','err'); return; }
  let i=rosterIdx(oldName);
  if(i<0){ ROSTER.push({medic:newName,fee:VIEW_MED[oldName]?.fee||0,suma:VIEW_MED[oldName]?.suma||0}); }
  else ROSTER[i].medic=newName;
  await saveRoster();
  toast('Redenumit. Notă: dacă medicul are program în clinici sub vechiul nume, actualizează-l și acolo.','ok');
  renderMatrix();
}
async function delRoster(name){
  const active = VIEW_MED[name] && VIEW_MED[name].nClinici>0;
  const msg = active
    ? name+' are program activ în clinici.\n\nȘtergerea din listă NU elimină programul din clinici. Sigur ștergi medicul din listă?'
    : 'Sigur ștergi «'+name+'» din listă?';
  const ok = await confirmDialog('Confirmare ștergere', msg, 'Șterge', 'Anulează');
  if(!ok) return;
  const i=rosterIdx(name); if(i>=0) ROSTER.splice(i,1);
  await saveRoster(); renderMatrix();
  toast(name+' a fost șters din listă','ok');
}
async function addRosterMedic(){
  const n=document.getElementById('newRosterMedic').value.trim();
  if(!n){ toast('Introdu numele medicului','err'); return; }
  const allNames=(ROSTER||[]).map(m=>m.medic);
  if(!confirmNotDuplicate(n,allNames)) return;
  const fee=(parseFloat(document.getElementById('newRosterFee').value)||0)/100;
  const suma=parseFloat(document.getElementById('newRosterSuma').value)||0;
  ROSTER.push({medic:n,fee,suma});
  await saveRoster();
  toast('Medic adăugat în listă','ok');
  renderMatrix();
}

/* ===================== UTIL ===================== */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
// Normalize a name: lowercase, strip diacritics, collapse spaces
function normName(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();}
// Find existing medic names similar to the candidate (exact, prefix, or containment)
function similarMedics(candidate,names){
  const c=normName(candidate); if(!c) return [];
  const out=[];
  names.forEach(n=>{
    const x=normName(n);
    if(x===c) out.push({n,kind:'identic'});
    else if(x.startsWith(c)||c.startsWith(x)) out.push({n,kind:'asemănător'});
    else { // share first two words (nume+prenume)
      const cw=c.split(' ').slice(0,2).join(' '), xw=x.split(' ').slice(0,2).join(' ');
      if(cw.length>4 && cw===xw) out.push({n,kind:'asemănător'});
    }
  });
  return out;
}
// Returns true if user wants to proceed adding as NEW (after showing duplicate warning)
function confirmNotDuplicate(candidate,names){
  const sim=similarMedics(candidate,names);
  if(sim.length===0) return true;
  const list=sim.slice(0,5).map(s=>'• '+s.n+' ('+s.kind+')').join('\n');
  return confirm('Există deja medici cu nume similar:\n\n'+list+'\n\nVrei totuși să adaugi «'+candidate+'» ca medic NOU, separat?\n\n(OK = adaug nou · Anulează = renunț)');
}
let toastT;
function confirmDialog(title,message,okLabel,cancelLabel){
  return new Promise(resolve=>{
    const ov=document.getElementById('confirmOverlay');
    document.getElementById('confirmTitle').textContent=title||'Confirmare';
    document.getElementById('confirmMsg').textContent=message||'';
    const okB=document.getElementById('confirmOk'), cxB=document.getElementById('confirmCancel');
    okB.textContent=okLabel||'OK'; cxB.textContent=cancelLabel||'Anulează';
    ov.classList.add('show');
    const done=(val)=>{ ov.classList.remove('show'); okB.onclick=null; cxB.onclick=null; resolve(val); };
    okB.onclick=()=>done(true); cxB.onclick=()=>done(false);
  });
}
function toast(msg,kind){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(kind||'');
  clearTimeout(toastT);toastT=setTimeout(()=>t.className='toast',2600);}
function toastUndo(msg,btnLabel,cb){
  const t=document.getElementById('toast');
  t.innerHTML=esc(msg)+' <button id="toastAction" style="margin-left:12px;background:rgba(255,255,255,.25);color:#fff;border-radius:7px;padding:4px 12px;font-weight:600;cursor:pointer">'+esc(btnLabel)+'</button>';
  t.className='toast show';
  const b=document.getElementById('toastAction');
  if(b) b.onclick=()=>{ clearTimeout(toastT); t.className='toast'; cb(); };
  clearTimeout(toastT); toastT=setTimeout(()=>t.className='toast',5000);
}
