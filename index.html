<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medima · Program Medici CAS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Red+Hat+Display:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --primary:#37008D; --secondary:#7D5DE7; --accent:#2AD1BC;
  --black:#1D1D29; --gray:#E7E3EE; --gray-mid:#9A93AD;
  --bg:#F6F4FB; --white:#fff;
  --ok:#2AD1BC; --warn:#E8A33D; --bad:#E0556E;
  --shadow:0 4px 24px rgba(55,0,141,.10); --shadow-lg:0 12px 48px rgba(55,0,141,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Red Hat Text',sans-serif;background:var(--bg);color:var(--black);font-size:14px;line-height:1.45}
h1,h2,h3{font-family:'Red Hat Display',sans-serif;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;font-size:14px}
.hidden{display:none!important}

/* ===== LOGIN ===== */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(900px 500px at 15% 0%,rgba(125,93,231,.16),transparent 60%),
    radial-gradient(800px 480px at 100% 100%,rgba(42,209,188,.14),transparent 60%),
    linear-gradient(160deg,#F3F0FB 0%,#EDE9F8 55%,#E9F6F3 100%)}
.login-card{background:var(--white);border-radius:24px;padding:48px 44px;width:min(420px,92vw);box-shadow:var(--shadow-lg);border:1px solid rgba(125,93,231,.10)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.brand-mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--secondary));
  display:grid;place-items:center;color:#fff;font-family:'Red Hat Display';font-weight:900;font-size:22px}
.brand-name{font-family:'Red Hat Display';font-weight:900;font-size:24px;color:var(--primary)}
.login-sub{color:var(--gray-mid);margin:4px 0 28px;font-size:13.5px}
.field-label{font-weight:600;font-size:12.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--gray-mid);margin-bottom:7px;display:block}
.code-input{width:100%;padding:14px 16px;border:2px solid var(--gray);border-radius:13px;font-size:16px;letter-spacing:.02em;transition:.15s;outline:none}
.code-input:focus{border-color:var(--secondary);box-shadow:0 0 0 4px rgba(125,93,231,.12)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:13px;font-weight:600;font-size:14.5px;transition:.16s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff;width:100%;margin-top:18px}
.btn-primary:hover{background:#2a006e;transform:translateY(-1px);box-shadow:var(--shadow)}
.login-err{color:var(--bad);font-size:13px;margin-top:12px;min-height:18px;font-weight:500}
.login-hint{margin-top:26px;padding-top:20px;border-top:1px solid var(--gray);font-size:12px;color:var(--gray-mid);line-height:1.7}
.login-hint code{background:var(--bg);padding:1px 7px;border-radius:6px;color:var(--primary);font-weight:600}

/* ===== APP SHELL ===== */
#app{min-height:100vh}
.topbar{position:sticky;top:0;z-index:30;background:var(--white);border-bottom:1px solid var(--gray);
  display:flex;align-items:center;gap:16px;padding:12px 22px;box-shadow:0 1px 12px rgba(55,0,141,.05)}
.topbar .brand-mark{width:34px;height:34px;font-size:17px;border-radius:9px}
.topbar-title{font-family:'Red Hat Display';font-weight:800;font-size:17px;color:var(--primary)}
.topbar-scope{font-size:12.5px;color:var(--gray-mid);font-weight:500}
.spacer{flex:1}
.week-nav{display:flex;align-items:center;gap:6px;background:var(--bg);border-radius:11px;padding:5px}
.week-nav button{width:30px;height:30px;border-radius:8px;font-size:17px;color:var(--primary);font-weight:700;display:grid;place-items:center}
.week-nav button:hover{background:var(--gray)}
.week-nav select{border:none;background:transparent;font-weight:600;color:var(--black);padding:4px 6px;cursor:pointer;outline:none}
.btn-ghost{padding:8px 14px;border-radius:10px;font-weight:600;font-size:13px;color:var(--primary);background:var(--bg)}
.btn-ghost:hover{background:var(--gray)}
.tabs{display:flex;gap:4px;padding:0 22px;background:var(--white);border-bottom:1px solid var(--gray);overflow-x:auto}
.tab{padding:13px 16px;font-weight:600;font-size:13.5px;color:var(--gray-mid);border-bottom:2.5px solid transparent;white-space:nowrap;transition:.13s}
.tab:hover{color:var(--black)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-add{color:var(--accent);font-weight:700}
.tab-add:hover{color:#1aa896}
.main{padding:22px 30px;max-width:none;margin:0;width:100%}

/* status pill */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.pill-saved{background:rgba(42,209,188,.16);color:#0f8d7c}
.pill-dirty{background:rgba(232,163,61,.18);color:#9a6410}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}

/* ===== SCHEDULE TABLE ===== */
.card{background:var(--white);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.card-head{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--gray)}
.card-head h2{font-size:17px;color:var(--primary)}
.card-head .sub{font-size:12.5px;color:var(--gray-mid);font-weight:500}
.table-wrap{overflow-x:auto}
table{border-collapse:collapse;width:100%;min-width:880px}
th{background:var(--bg);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--gray-mid);
  padding:11px 10px;text-align:left;position:sticky;top:0;border-bottom:1px solid var(--gray)}
td{padding:7px 8px;border-bottom:1px solid #F0EEF6;vertical-align:middle}
tr:hover td{background:#FBFAFE}
.medic-name{font-weight:600;min-width:150px}
.day-cell input{width:110px;padding:6px 7px;border:1.5px solid transparent;border-radius:7px;text-align:center;background:#F4F2FA;transition:.12s;font-size:12.5px}
.day-cell input:focus{border-color:var(--secondary);background:#fff;outline:none}
.day-cell input.liber{color:var(--gray-mid)}
.cell-input{padding:6px 8px;border:1.5px solid transparent;border-radius:7px;background:#F4F2FA;width:100%;transition:.12s}
.cell-input:focus{border-color:var(--secondary);background:#fff;outline:none}
select.cell-input{cursor:pointer}
.fee-input{width:64px;text-align:center}
.suma-input{width:78px;text-align:right}
.ore-badge{font-weight:700;color:var(--primary);font-size:14px;text-align:center}
.row-del{color:var(--gray-mid);font-size:16px;width:28px;height:28px;border-radius:7px}
.row-del:hover{background:rgba(224,85,110,.13);color:var(--bad)}
.add-row{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--gray);align-items:center;flex-wrap:wrap}
.add-row-top{border-top:none;border-bottom:1px solid var(--gray);background:#FBFAFE}
.scroll-x{overflow-x:scroll}
.scroll-x::-webkit-scrollbar{height:12px}
.scroll-x::-webkit-scrollbar-track{background:var(--gray);border-radius:6px}
.scroll-x::-webkit-scrollbar-thumb{background:var(--secondary);border-radius:6px;border:2px solid var(--gray)}
.scroll-x::-webkit-scrollbar-thumb:hover{background:var(--primary)}
.add-row input,.add-row select{padding:9px 11px;border:1.5px solid var(--gray);border-radius:9px;outline:none}
.add-row input:focus{border-color:var(--secondary)}
.btn-add{background:var(--accent);color:#06403a;padding:9px 16px;border-radius:9px;font-weight:600}
.btn-add:hover{filter:brightness(1.06)}

.inherited-note{font-size:11px;color:var(--gray-mid);font-style:italic}
.override-tag{font-size:10px;background:rgba(125,93,231,.15);color:var(--secondary);padding:1px 6px;border-radius:6px;font-weight:600;margin-left:6px}

/* ===== DASHBOARD ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--white);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;right:-20px;top:-20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--secondary),var(--accent));opacity:.08}
.kpi-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--gray-mid);font-weight:600}
.kpi-val{font-family:'Red Hat Display';font-weight:900;font-size:26px;color:var(--primary);line-height:1.1;margin-top:3px}
.kpi-sub{font-size:11px;color:var(--gray-mid);margin-top:1px}
.risk-low{color:var(--ok)!important}.risk-mid{color:var(--warn)!important}.risk-high{color:var(--bad)!important}

/* dashboard rich layout */
.dash-head{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.alert-bar{background:linear-gradient(100deg,rgba(224,85,110,.14),rgba(232,163,61,.12));border:1px solid rgba(224,85,110,.3);
  color:#9a3149;border-radius:12px;padding:12px 18px;font-size:13.5px;margin-bottom:18px;font-weight:500}
.dash-2col{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;align-items:start}
@media(max-width:1050px){.dash-2col{grid-template-columns:1fr}}
.sum-table{width:100%;font-size:14.5px}
.sum-table th.ctr,.sum-table td.ctr{text-align:center}
.sum-table td,.sum-table th{padding:9px 12px}
.sum-table td:first-child,.sum-table th:first-child{width:1%;white-space:nowrap;padding-right:14px}
.sum-table th:last-child,.sum-table td.evo-cell{width:auto}
.sum-table tr.row-empty td{background:#FBF6F7;color:var(--gray-mid)}
.sum-table td.b9{background:rgba(55,0,141,.14);color:var(--primary);font-weight:700;border-radius:5px}
.sum-table td.b6{background:rgba(125,93,231,.16);color:var(--secondary);font-weight:700}
.sum-table td.b3{background:rgba(42,209,188,.16);color:#0f8d7c;font-weight:700}
.sum-table td.pz-prez{color:#0f8d7c;font-weight:600}
.sum-table td.pz-local{color:var(--secondary);font-weight:600}
.sum-table td.pz-reg{color:#9a6410;font-weight:600}
.sum-table td.pz-afara{color:var(--bad);font-weight:600}
.evo-cell{padding-left:56px!important}
.sum-table th:last-child{padding-left:56px!important;text-align:left}
.evo-track{display:flex;flex-wrap:nowrap;gap:0;width:100%}
.evo-track .sq{flex:1 1 0;min-width:5px;max-width:13px;height:14px;margin:0 1px;border-radius:2px}
.evo-track .sq.sq-ovr{box-shadow:0 0 0 2px var(--black);position:relative;z-index:1}
.evo-track .sq[onclick]:hover{outline:2px solid var(--secondary);outline-offset:1px}
.sq{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:1.5px;vertical-align:middle}
.sq-low{background:var(--ok)}
.sq-mid{background:var(--warn)}
.sq-high{background:var(--bad)}
.sq-none{background:var(--gray)}
.sq-future{background:transparent;border:1px dashed var(--gray-mid);opacity:.5}
.row-unassigned td{color:var(--gray-mid)}
.row-unassigned td:first-child{font-style:italic}
/* filter & export bar */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--gray);background:#FBFAFE}
.flt{padding:8px 12px;border:1.5px solid var(--gray);border-radius:10px;font-size:13px;outline:none;background:#fff;transition:.12s}
.flt:focus{border-color:var(--secondary);box-shadow:0 0 0 3px rgba(125,93,231,.1)}
#fSearch{min-width:180px}
.flt-clear{padding:8px 14px;border-radius:10px;font-size:12.5px;font-weight:600;color:var(--gray-mid);background:var(--gray)}
.flt-clear:hover{background:#d8d2e6;color:var(--black)}
.btn-export{padding:8px 14px;border-radius:10px;font-size:12.5px;font-weight:600;color:#06403a;background:var(--accent)}
.btn-export:hover{filter:brightness(1.06)}
.zoom-ctl{display:flex;align-items:center;gap:4px;background:#fff;border:1.5px solid var(--gray);border-radius:10px;padding:3px 6px;margin-right:4px}
.zoom-lbl{font-size:11px;color:var(--gray-mid);font-weight:600;text-transform:uppercase;letter-spacing:.03em;padding:0 4px}
.zoom-btn{width:26px;height:26px;border-radius:7px;font-size:15px;font-weight:700;color:var(--primary);background:var(--bg)}
.zoom-btn:hover{background:var(--gray)}
.zoom-val{font-size:12.5px;font-weight:600;min-width:38px;text-align:center;color:var(--black)}
.zoom-fit{width:auto;padding:0 9px;font-size:12px}
.view-summary{padding:12px 20px;font-size:13px;color:var(--black);background:linear-gradient(100deg,rgba(125,93,231,.08),rgba(42,209,188,.06));border-bottom:1px solid var(--gray)}
.view-summary b{color:var(--primary)}
.warn-flag{color:var(--warn);font-size:13px;cursor:help;margin-left:4px}
.row-warn td{background:rgba(232,163,61,.07)}
.row-warn td:first-child{box-shadow:inset 3px 0 0 var(--warn)}
.view-alerts{padding:12px 20px;border-bottom:1px solid var(--gray);background:rgba(232,163,61,.08);max-height:160px;overflow-y:auto}
.alerts-head{font-weight:700;color:#9a6410;font-size:13px;margin-bottom:6px}
.alerts-detail{font-size:12px;color:#9a6410;display:block}
.alert-item{font-size:12.5px;color:#7a5210;padding:2px 0}
.alert-item b{color:#5e3f0c}
.confirm-overlay{position:fixed;inset:0;background:rgba(29,29,41,.45);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.confirm-overlay.show{display:flex}
.confirm-box{background:#fff;border-radius:18px;padding:26px 26px 20px;width:min(420px,92vw);box-shadow:0 20px 60px rgba(29,29,41,.35)}
.confirm-box h3{font-family:'Red Hat Display';color:var(--primary);font-size:18px;margin-bottom:10px}
.confirm-box p{font-size:14px;color:var(--black);white-space:pre-line;line-height:1.5;margin-bottom:20px}
.confirm-actions{display:flex;justify-content:flex-end;gap:10px}
.btn-danger{background:var(--bad);color:#fff;padding:10px 20px;border-radius:11px;font-weight:600;font-size:14px}
.btn-danger:hover{filter:brightness(1.05)}
.mx-edit{width:48px;text-align:center;border:1.5px solid var(--gray);border-radius:6px;padding:4px 5px;font-size:12.5px;outline:none;background:#fff}
.mx-edit.wide{width:72px;text-align:right}
.mx-edit:focus{border-color:var(--secondary);box-shadow:0 0 0 3px rgba(125,93,231,.1)}
.pct{color:var(--gray-mid);font-size:11px;margin-left:2px}
.row-actions{white-space:nowrap;text-align:center;width:64px;min-width:64px}
.ico{width:26px;height:26px;border-radius:7px;font-size:14px;color:var(--gray-mid);background:transparent;margin:0 1px}
.ico:hover{background:rgba(125,93,231,.14);color:var(--secondary)}
.ico-del:hover{background:rgba(224,85,110,.14);color:var(--bad)}
@media print{
  .topbar,.tabs,.filter-bar,.week-nav,#login{display:none!important}
  .card{box-shadow:none;border:1px solid #ccc}
  .matrix-wrap{overflow:visible!important;max-height:none!important}
  body{background:#fff}
}
.rpill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.pill-ok{background:rgba(42,209,188,.18);color:#0f8d7c}
.pill-mid{background:rgba(232,163,61,.2);color:#9a6410}
.pill-bad{background:rgba(224,85,110,.18);color:#b23054}
.pill-grey{background:var(--gray);color:var(--gray-mid)}
.risk-legend{padding:14px 20px;border-top:1px solid var(--gray);font-size:12px;color:var(--gray-mid)}
.rl-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.col-tot td{background:var(--bg);font-weight:700;color:var(--primary);border-top:2px solid var(--gray)}
.col-tot td:first-child{font-size:12px}
/* presence grid */
.presence-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px 28px}
/* risk evolution heatmap */
.heat-table{border-collapse:separate;border-spacing:2px;min-width:max-content}
.heat-table th.hm-h{font-size:10px;font-weight:600;color:var(--gray-mid);padding:4px 2px;text-align:center;white-space:nowrap;background:transparent;border:none;position:static;transform:rotate(-0deg)}
.heat-table th.hm-clinic,.heat-table td.hm-clinic{position:sticky;left:0;background:var(--white);text-align:left;font-weight:600;font-size:12.5px;padding:4px 8px 4px 4px;white-space:nowrap;z-index:2;border:none;width:1%}
.heat-table th.hm-clinic{z-index:3}
.hm-cell{width:26px;height:22px;text-align:center;font-size:10px;font-weight:700;border-radius:4px;color:#fff;display:table-cell;vertical-align:middle}
span.hm-cell{display:inline-block;width:15px;height:15px;border-radius:4px;vertical-align:middle}
.hm-low{background:var(--ok)}
.hm-mid{background:var(--warn)}
.hm-high{background:var(--bad)}
.hm-none{background:var(--gray)}

.matrix-wrap{overflow:auto;max-height:72vh;border-top:1px solid var(--gray)}
.matrix-wrap table{min-width:1400px;border-collapse:separate;border-spacing:0}
.matrix-wrap thead th{position:sticky;top:0;z-index:4;background:var(--bg);font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--gray-mid);font-weight:700;padding:11px 12px;border-bottom:2px solid var(--gray);white-space:nowrap}
.matrix-wrap tbody td{padding:7px 12px;border-bottom:1px solid #F2F0F8;font-size:13px}
.matrix-wrap tbody tr:hover td{background:#FBFAFE}
.matrix-wrap th:first-child,.matrix-wrap td:first-child{position:sticky;left:0;z-index:2;background:var(--white)}
.matrix-wrap th:first-child{z-index:5;background:var(--bg)}
.matrix-wrap thead th:nth-child(2),.matrix-wrap tbody td:nth-child(2){position:sticky;left:64px;z-index:2;background:var(--white);font-weight:600}
.matrix-wrap thead th:nth-child(2){z-index:5;background:var(--bg)}
.matrix-wrap tbody tr:hover td:nth-child(2){background:#FBFAFE}
.mx-num{text-align:center;font-variant-numeric:tabular-nums}
.mx-3{background:rgba(42,209,188,.12)}.mx-6{background:rgba(125,93,231,.14)}.mx-9{background:rgba(55,0,141,.16);color:#fff;font-weight:600}
.mx-tot{font-weight:700;color:var(--primary);text-align:center}
/* aligned editable fee / suma cells */
.mx-cell-edit{display:inline-flex;align-items:center;justify-content:flex-end;gap:3px;background:#F4F2FA;border:1.5px solid transparent;border-radius:8px;padding:3px 8px;width:84px;transition:.12s}
.mx-cell-edit:focus-within{border-color:var(--secondary);background:#fff;box-shadow:0 0 0 3px rgba(125,93,231,.1)}
.mx-cell-edit input{border:none;background:transparent;outline:none;text-align:right;width:100%;font-size:13px;font-variant-numeric:tabular-nums;padding:1px 0}
.mx-cell-edit .unit{color:var(--gray-mid);font-size:11.5px;flex:none}
/* Predispoziție alocări — semafor */
.mx-pd{text-align:center}
.pd-dot{display:inline-block;width:18px;height:18px;border-radius:50%;cursor:pointer;vertical-align:middle;transition:.12s;box-sizing:border-box}
.pd-dot:hover{transform:scale(1.18)}
/* Supraspecializare chip */
.mx-ss{max-width:180px}
.ss-chip{display:inline-block;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;padding:3px 9px;border-radius:20px;background:rgba(125,93,231,.1);color:var(--secondary);cursor:pointer;border:1px solid rgba(125,93,231,.25)}
.ss-chip:hover{background:rgba(125,93,231,.18)}
.ss-list{display:flex;flex-direction:column;gap:2px;max-height:300px;overflow-y:auto;margin:10px 0;border:1px solid var(--gray);border-radius:10px;padding:8px}
.ss-opt{display:flex;align-items:center;gap:8px;font-size:13.5px;padding:6px 8px;border-radius:7px;cursor:pointer}
.ss-opt:hover{background:var(--bg)}
.ss-opt input{width:16px;height:16px;accent-color:var(--secondary)}
.ss-opt-row{display:flex;align-items:center;justify-content:space-between;border-radius:7px}
.ss-opt-row:hover{background:var(--bg)}
.ss-opt-row .ss-opt{flex:1}
.ss-opt-acts{display:flex;gap:2px;padding-right:6px;opacity:.55}
.ss-opt-row:hover .ss-opt-acts{opacity:1}
.ss-add{display:flex;gap:8px}
.ss-add input{flex:1;padding:9px 11px;border:1.5px solid var(--gray);border-radius:9px;outline:none}
.ss-add input:focus{border-color:var(--secondary)}
/* Compact matrix/CAS layout (no 33 clinic columns) */
.mx-compact{min-width:0!important;width:100%}
.mx-compact .mx-name{font-weight:600;white-space:nowrap}
.mx-clinics{max-width:none}
.clinic-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:2px 9px;margin:2px 3px 2px 0;border-radius:20px;background:var(--bg);border:1px solid var(--gray);white-space:nowrap}
.clinic-pill b{font-weight:700}
.clinic-pill.cp-9{background:rgba(55,0,141,.12);border-color:rgba(55,0,141,.3);color:var(--primary)}
.clinic-pill.cp-6{background:rgba(125,93,231,.12);border-color:rgba(125,93,231,.3);color:var(--secondary)}
.clinic-pill.cp-3{background:rgba(42,209,188,.14);border-color:rgba(42,209,188,.35);color:#0f8d7c}
.cp-none{color:var(--gray-mid)}
/* ===== Recrutare CRM ===== */
.rec-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px}
.rec-stat{background:var(--white);border-radius:14px;box-shadow:var(--shadow);padding:14px 18px;text-align:center}
.rec-stat .rs-num{font-size:26px;font-weight:800;line-height:1}
.rec-stat .rs-lbl{font-size:12px;color:var(--gray-mid);margin-top:5px;font-weight:600}
.rec-summary{padding:10px 20px;font-size:13px;color:var(--gray-mid)}
.rec-tbl td{vertical-align:middle}
.rec-cat{font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(55,0,141,.08);color:var(--primary)}
.rec-link{color:var(--secondary);text-decoration:none}
.rec-link:hover{text-decoration:underline}
.rec-status{font-size:12.5px;font-weight:600;padding:5px 8px;border:1.5px solid var(--gray);border-radius:8px;background:var(--white);cursor:pointer;max-width:170px}
.rec-status.rs-green{background:rgba(42,209,188,.14);border-color:rgba(42,209,188,.4);color:#0f8d7c}
.rec-status.rs-blue{background:rgba(125,93,231,.12);border-color:rgba(125,93,231,.35);color:var(--secondary)}
.rec-status.rs-amber{background:rgba(232,163,61,.14);border-color:rgba(232,163,61,.4);color:#9a6410}
.rec-status.rs-red{background:rgba(224,85,110,.12);border-color:rgba(224,85,110,.4);color:var(--bad)}
.rec-status.rs-grey{background:var(--bg);border-color:var(--gray);color:var(--gray-mid)}
.rec-note{width:100%;min-width:200px;padding:6px 9px;border:1.5px solid var(--gray);border-radius:8px;font-size:12.5px;outline:none;font-family:inherit}
.rec-note:focus{border-color:var(--secondary)}
.rec-contact{display:flex;flex-direction:column;gap:3px}
.rec-mini{width:130px;padding:4px 7px;border:1px solid var(--gray);border-radius:6px;font-size:11.5px;outline:none;font-family:inherit}
.rec-mini:focus{border-color:var(--secondary)}
.rec-sort{cursor:pointer;user-select:none;white-space:nowrap}
.rec-sort:hover{color:var(--primary)}
.rec-save{margin-top:2px;padding:3px 10px;font-size:11px;font-weight:600;border:none;border-radius:6px;background:var(--secondary);color:#fff;cursor:pointer}
.rec-save:hover{background:var(--primary)}
.rec-save.saved-flash{background:var(--accent);color:#06443d}
.rec-notewrap{display:flex;flex-direction:column;gap:4px}
.note-item{background:var(--bg);border-radius:7px;border-left:2px solid var(--secondary);padding:4px 7px}
.note-h{display:flex;justify-content:space-between;align-items:center;gap:4px}
.note-d{font-size:10px;color:var(--gray-mid);font-weight:600}
.note-a{display:flex;gap:1px;flex:none}
.note-t{font-size:12px;line-height:1.35;white-space:pre-wrap;word-break:break-word}
.note-empty{color:var(--gray-mid);font-size:12px}
.note-addrow{display:flex;gap:3px}
.note-input{flex:1;min-width:0;padding:5px 8px;border:1.5px solid var(--gray);border-radius:7px;font-size:12px;outline:none;font-family:inherit}
.note-input:focus{border-color:var(--secondary)}
.note-addbtn{flex:none;width:30px;padding:5px 0;font-size:15px;line-height:1}
.name-note{font-size:11px;color:var(--secondary);margin-top:4px;line-height:1.3;background:rgba(125,93,231,.07);padding:3px 7px;border-radius:6px;border-left:2px solid var(--secondary)}
/* Balanced fixed layout so the table fits without horizontal scroll */
.rec-tbl{table-layout:fixed;width:100%;min-width:0}
.rec-tbl th,.rec-tbl td{overflow:hidden;text-overflow:ellipsis}
.rec-tbl col.c-nume{width:15%}
.rec-tbl col.c-spec{width:9%}
.rec-tbl col.c-grad{width:8%}
.rec-tbl col.c-comp{width:10%}
.rec-tbl col.c-clin{width:8%}
.rec-tbl col.c-jud{width:8%}
.rec-tbl col.c-resp{width:11%}
.rec-tbl col.c-tel{width:11%}
.rec-tbl col.c-mail{width:12%}
.rec-tbl col.c-status{width:11%}
.rec-tbl .mx-name{white-space:normal;line-height:1.25}
.rec-tbl .ss-chip{max-width:100%;box-sizing:border-box}
.rec-tbl .rec-mini,.rec-tbl .rec-status{width:100%;min-width:0;box-sizing:border-box}
.rec-inline{display:flex;gap:3px;align-items:center}
.rec-inline .rec-mini{flex:1;min-width:0}
.rec-isave{flex:none;width:26px;height:28px;border:none;border-radius:6px;background:var(--secondary);color:#fff;cursor:pointer;font-size:13px;line-height:1}
.rec-isave:hover{background:var(--primary)}
.rec-isave.isave-ok{background:var(--accent);color:#06443d}
.rec-name-link{font-weight:600;color:var(--primary);cursor:pointer;text-decoration:underline;text-decoration-color:rgba(55,0,141,.25);text-underline-offset:2px}
.rec-name-link:hover{text-decoration-color:var(--primary)}
.note-badge{font-size:11px;color:var(--secondary);background:rgba(125,93,231,.1);border-radius:10px;padding:1px 7px;cursor:default;white-space:nowrap}
.note-badge-empty{color:var(--gray-mid);background:transparent}
.rec-del{border:none;background:transparent;color:var(--gray);cursor:pointer;font-size:13px;padding:1px 5px;border-radius:5px;margin-left:2px;line-height:1}
.rec-del:hover{background:rgba(224,85,110,.12);color:var(--bad)}
/* Notes drawer */
.note-drawer{position:fixed;inset:0;z-index:1000;display:none}
.note-drawer.open{display:block}
.nd-backdrop{position:absolute;inset:0;background:rgba(29,29,41,.4)}
.nd-panel{position:absolute;top:0;right:0;height:100%;width:min(440px,92vw);background:var(--white);box-shadow:-8px 0 30px rgba(0,0,0,.18);display:flex;flex-direction:column;animation:ndslide .22s ease}
@keyframes ndslide{from{transform:translateX(100%)}to{transform:translateX(0)}}
.nd-head{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 22px 14px;border-bottom:1px solid var(--gray)}
.nd-title{font-size:18px;font-weight:700;color:var(--primary)}
.nd-sub{font-size:12.5px;color:var(--gray-mid);margin-top:3px}
.nd-close{border:none;background:transparent;font-size:26px;line-height:1;color:var(--gray-mid);cursor:pointer;padding:0 4px}
.nd-close:hover{color:var(--bad)}
.nd-addrow{display:flex;gap:8px;align-items:stretch;padding:16px 22px;border-bottom:1px solid var(--gray)}
.nd-input{flex:1 1 0;width:0;min-width:0;min-height:46px;padding:10px 12px;border:1.5px solid var(--gray);border-radius:10px;font-family:inherit;font-size:13.5px;outline:none;resize:vertical;box-sizing:border-box}
.nd-input:focus{border-color:var(--secondary)}
.nd-add{flex:0 0 auto;width:auto;margin-top:0;padding:10px 18px;white-space:nowrap}
.nd-list{flex:1;overflow-y:auto;padding:16px 22px;display:flex;flex-direction:column;gap:10px}
.nd-empty{color:var(--gray-mid);font-size:13.5px;text-align:center;padding:30px 10px}
.nd-item{border:1px solid var(--gray);border-radius:12px;padding:11px 14px;background:var(--bg)}
.nd-item-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.nd-date{font-size:11.5px;color:var(--gray-mid);font-weight:600}
.nd-acts{display:flex;gap:3px}
.nd-text{font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
@media(max-width:1100px){.rec-stats{grid-template-columns:repeat(2,1fr)}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--black);color:#fff;
  padding:13px 22px;border-radius:13px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow-lg);opacity:0;transition:.3s;z-index:99}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{background:#0f8d7c}.toast.err{background:var(--bad)}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--gray-mid);padding:0 4px 14px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:13px;height:13px;border-radius:4px;display:inline-block}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-mid)}
.banner{background:linear-gradient(100deg,rgba(125,93,231,.12),rgba(42,209,188,.10));border:1px solid rgba(125,93,231,.25);
  border-radius:13px;padding:13px 18px;font-size:13px;margin-bottom:18px;display:flex;gap:10px;align-items:center;color:#4a2d8f}
</style>
</head>

<script>
/* ============ STATE & PERSISTENCE ============
   Prototip: datele se salvează LOCAL (window.storage) per utilizator.
   În versiunea conectată, aceste funcții (loadWeek/saveWeek) vor apela
   Google Sheets prin Apps Script web-app, păstrând aceeași interfață. */
</script>
<script>
/* ===================== CONFIG ===================== */
// CLINICS and CODES are mutable and persisted so new clinics can be added in production.
let CLINICS = DEMO.clinics.slice();
let CODES = Object.assign({}, DEMO.codes);   // clinic -> access code
const CENTRAL_CODE = 'medima-central';
const DAYS = ['Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă','Duminică'];
const PREZENTA_OPTS = ['', 'Prezent în clinică','Medic local','Medic regional','Din afara regiunii'];
const STORE_PREFIX = 'medima_prog_v1:';   // storage key namespace

/* Storage abstraction: uses window.storage in the Claude artifact environment,
   falls back to localStorage when the file is opened directly in a browser,
   and to an in-memory map as a last resort. Same async interface either way. */
const memStore={};
const STORE = (function(){
  // Prototype: prefer instant localStorage. window.storage (artifact bridge)
  // can be slow, so it is only a fallback when localStorage is unavailable.
  const hasLS=(()=>{try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return true;}catch(e){return false;}})();
  if(hasLS){
    return {
      async get(k){ const v=localStorage.getItem(k); return v==null?null:{key:k,value:v}; },
      async set(k,v){ localStorage.setItem(k,v); return {key:k,value:v}; }
    };
  }
  if(typeof window!=='undefined' && window.storage && typeof window.storage.get==='function'){
    const withTimeout=(p)=>Promise.race([p,new Promise((_,rej)=>setTimeout(()=>rej(new Error('storage timeout')),4000))]);
    return {
      async get(k){ try{ return await withTimeout(window.storage.get(k)); }catch(e){ return null; } },
      async set(k,v){ try{ return await withTimeout(window.storage.set(k,v)); }catch(e){ return null; } }
    };
  }
  return {
    async get(k){ return k in memStore?{key:k,value:memStore[k]}:null; },
    async set(k,v){ memStore[k]=v; return {key:k,value:v}; }
  };
})();

/* ===================== BACKEND (Google Sheets web app) =====================
   When BACKEND.url is set, the tool reads/writes the shared Google Sheet through
   the Apps Script web app. The access code (entered at login) authorizes each call.
   If the backend is unreachable, the tool stays usable in local mode. */
const BACKEND = {
  url: 'https://script.google.com/macros/s/AKfycbyEaMuWRpsvMSIOMqscbGVdKjXdAm-BfGny4NjJ8B1dW3NpVQbZ5BEisOkT_imMyTS2/exec',
  code: null,          // set at login (raw access code)
  enabled: true
};
async function api(action, payload){
  if(!BACKEND.enabled || !BACKEND.url) throw new Error('backend off');
  const body = Object.assign({action, code: BACKEND.code}, payload||{});
  const res = await fetch(BACKEND.url, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // text/plain avoids CORS preflight
    body: JSON.stringify(body),
    redirect:'follow'
  });
  const txt = await res.text();
  let data; try{ data=JSON.parse(txt); }catch(e){ throw new Error('răspuns invalid de la server'); }
  if(data && data.ok===false) throw new Error(data.error||'eroare server');
  return data;
}

/* ===================== WEEKS ===================== */
// Monitoring starts Mon 01.06.2026. Pre-generate all Mondays to end of 2026.
const MONITOR_START='2026-06-01';
function genWeeks(){
  const w=[]; let d=new Date(MONITOR_START+'T00:00:00Z');
  while(d.getUTCFullYear()===2026){ w.push(iso(d)); d.setUTCDate(d.getUTCDate()+7); }
  return w;
}
function iso(d){return d.toISOString().slice(0,10);}
function fmtWeek(s){const d=new Date(s+'T00:00:00Z');const e=new Date(d);e.setUTCDate(e.getUTCDate()+6);
  const f=x=>String(x.getUTCDate()).padStart(2,'0')+'.'+String(x.getUTCMonth()+1).padStart(2,'0');
  return f(d)+'–'+f(e)+'.'+d.getUTCFullYear();}
const WEEKS = genWeeks();

/* ===================== SESSION ===================== */
let SESSION = null;   // {role:'clinic'|'central', clinic:str|null}
let curWeek = defaultWeek();
let activeTab = null; // clinic name OR 'dashboard'|'cas'|'matrix'
let dirty = false;

function defaultWeek(){
  const today=new Date(); const t=iso(today);
  let best=WEEKS[0];
  for(const w of WEEKS){ if(w<=t) best=w; else break; }
  return best;
}

/* ===================== DATA MODEL =====================
   In-memory cache: weekData[week][clinic] = [ {medic,prezenta,fee,suma,invest,zile:[7], _override:bool} ]
   Propagation: a week with no stored data inherits a deep copy from the most recent
   PRIOR week that has data for that clinic. Editing + saving creates an explicit
   record for that week; that record then becomes the base for later weeks. */
const cache = {}; // week -> clinic -> rows (working copy, includes inherited)
let SERVER_DATA = null; // snapshot from one bulk loadAll: week -> clinic -> rows (saved only)
let RISC_OVERRIDE = {}; // "week::clinic" -> "Scăzut"|"Mediu"|"Ridicat" (admin manual override)

function riscKey(week,clinic){return week+'::'+clinic;}
async function loadRiscOverride(){
  if(!(BACKEND.enabled && BACKEND.url)) return;
  try{ const r=await api('loadRisc',{}); RISC_OVERRIDE=r.risc||{}; }catch(e){ RISC_OVERRIDE={}; }
}
// Cycle order for click-through: automat -> Scăzut -> Mediu -> Ridicat -> automat
const RISC_CYCLE=['Scăzut','Mediu','Ridicat'];
async function cycleRisc(week,clinic){
  if(!SESSION || SESSION.role!=='central') return;
  const k=riscKey(week,clinic);
  const cur=RISC_OVERRIDE[k];
  let next;
  if(!cur) next='Scăzut';
  else{ const i=RISC_CYCLE.indexOf(cur); next = i>=RISC_CYCLE.length-1 ? '' : RISC_CYCLE[i+1]; }
  // optimistic UI
  if(next) RISC_OVERRIDE[k]=next; else delete RISC_OVERRIDE[k];
  if(activeTab==='dashboard') renderDashboard();
  try{ await api('setRisc',{week,clinic,risc:next||'auto'}); setStatus(true); }
  catch(e){ toast('Salvare risc eșuată: '+e.message,'err'); await loadRiscOverride(); if(activeTab==='dashboard') renderDashboard(); }
}

function storeKey(week,clinic){return STORE_PREFIX+week+'::'+clinic;}

// Risk to display: manual override (admin) takes precedence over the computed value.
function effectiveRisc(week,clinic,computed){
  const o=RISC_OVERRIDE[riscKey(week,clinic)];
  return o || computed;
}

// Load the entire dataset in ONE server call (or from local store), cached in memory.
async function primeData(){
  if(SERVER_DATA) return SERVER_DATA;
  SERVER_DATA={};
  if(BACKEND.enabled && BACKEND.url){
    try{ const r=await api('loadAll',{}); SERVER_DATA=r.data||{}; }catch(e){ SERVER_DATA={}; }
  }
  return SERVER_DATA;
}
function serverRows(week,clinic){
  return (SERVER_DATA && SERVER_DATA[week] && SERVER_DATA[week][clinic]) ? SERVER_DATA[week][clinic] : null;
}

async function loadWeekClinic(week,clinic){
  if(cache[week]&&cache[week][clinic]) return cache[week][clinic];
  let rows=null;
  if(BACKEND.enabled && BACKEND.url){
    await primeData();
    const sr=serverRows(week,clinic); rows=(sr&&sr.length)?sr.map(x=>({...x,zile:[...x.zile]})):null;
  } else {
    try{ const r=await STORE.get(storeKey(week,clinic)); if(r&&r.value) rows=JSON.parse(r.value);}catch(e){}
  }
  if(!rows){
    // inherit from most recent prior week that has data
    rows = await inheritRows(week,clinic);
  }
  cache[week]=cache[week]||{}; cache[week][clinic]=rows;
  return rows;
}

async function inheritRows(week,clinic){
  const idx=WEEKS.indexOf(week);
  for(let i=idx-1;i>=0;i--){
    const w=WEEKS[i];
    if(BACKEND.enabled && BACKEND.url){
      await primeData();
      const sr=serverRows(w,clinic);
      if(sr&&sr.length){ return sr.map(x=>({...x,zile:[...x.zile],_inherited:true})); }
    } else {
      try{ const r=await STORE.get(storeKey(w,clinic));
        if(r&&r.value){ const base=JSON.parse(r.value);
          return base.map(x=>({...x,zile:[...x.zile],_inherited:true})); }
      }catch(e){}
    }
  }
  // fallback: seed from DEMO baseline (only used before any real data exists)
  const seed=(DEMO.demo[clinic]||[]).map(x=>({
    medic:x.medic,prezenta:x.prezenta||'',fee:x.fee||0,suma:x.suma||0,
    invest:x.invest||'Nu',zile:[...x.zile],_inherited:true}));
  return seed;
}

async function saveWeekClinic(week,clinic,rows){
  cache[week]=cache[week]||{}; cache[week][clinic]=rows;
  const clean=rows.map(({_inherited,_override,...r})=>r);
  if(BACKEND.enabled && BACKEND.url){
    try{
      await api('saveClinic',{week,clinic,rows:clean});
      // keep the in-memory snapshot in sync so we don't need to refetch everything
      if(SERVER_DATA){ SERVER_DATA[week]=SERVER_DATA[week]||{}; SERVER_DATA[week][clinic]=clean.map(x=>({...x,zile:[...x.zile]})); }
      return true;
    }catch(e){ toast('Salvarea pe server a eșuat: '+e.message,'err'); return false; }
  }
  try{ await STORE.set(storeKey(week,clinic),JSON.stringify(clean));
    return true; }catch(e){ return false; }
}

/* ===================== CALC HELPERS ===================== */
// parse "8-17" or "8-17, 18-20" -> total hours
function hoursFromCell(v){
  if(!v||/liber/i.test(v)) return 0;
  let tot=0;
  v.split(',').forEach(seg=>{
    const m=seg.trim().match(/(\d{1,2})\s*-\s*(\d{1,2})/);
    if(m){let a=+m[1],b=+m[2]; if(b<a)b+=12; tot+=Math.max(0,b-a);}
  });
  return tot;
}
function weekHours(row){ return row.zile.reduce((s,d)=>s+hoursFromCell(d),0); }
// Parse a day cell "8-17, 18-20" into intervals [[8,17],[18,20]]
function intervalsFromCell(v){
  if(!v||/liber/i.test(v)) return [];
  const out=[];
  v.split(',').forEach(seg=>{
    const m=seg.trim().match(/(\d{1,2})\s*-\s*(\d{1,2})/);
    if(m){let a=+m[1],b=+m[2]; if(b<a)b+=12; if(b>a) out.push([a,b]);}
  });
  return out;
}
// Union length of a set of intervals (covered hours, overlaps counted once)
function unionHours(intervals){
  if(!intervals.length) return 0;
  const s=intervals.slice().sort((x,y)=>x[0]-y[0]);
  let total=0, curS=s[0][0], curE=s[0][1];
  for(let i=1;i<s.length;i++){
    if(s[i][0]<=curE){ curE=Math.max(curE,s[i][1]); }
    else { total+=curE-curS; curS=s[i][0]; curE=s[i][1]; }
  }
  total+=curE-curS;
  return total;
}
// CAS hour-band per day: max daily hours mapped to 3/6/9
function casBand(row){
  const maxDay=Math.max(0,...row.zile.map(hoursFromCell));
  if(maxDay>=9) return 9; if(maxDay>=6) return 6; if(maxDay>=3) return 3; return 0;
}
// Per-clinic operational summary for a set of medic rows
function clinicStats(rows){
  rows=rows||[];
  const medici=rows.length;
  let b9=0,b6=0,b3=0, prezent=0,local=0,regional=0,afara=0;
  rows.forEach(r=>{
    const b=casBand(r); if(b===9)b9++; else if(b===6)b6++; else if(b===3)b3++;
    if(/prezent/i.test(r.prezenta))prezent++;
    else if(/local/i.test(r.prezenta))local++;
    else if(/regional/i.test(r.prezenta))regional++;
    else if(/afara/i.test(r.prezenta))afara++;
  });
  // Coverage Mon-Fri: for each weekday, union of all medics' intervals (overlaps counted once),
  // then average across the 5 weekdays.
  let coverMonFri=0;
  for(let d=0;d<5;d++){
    let dayIntervals=[];
    rows.forEach(r=>{ dayIntervals=dayIntervals.concat(intervalsFromCell(r.zile[d])); });
    coverMonFri+=unionHours(dayIntervals);
  }
  const acoperire = medici? (coverMonFri/5) : 0; // avg covered hours/day Mon-Fri (distinct)
  let risc, status;
  if(medici===0){ risc='Necompletat'; status='necompletat'; }
  else{
    status='ok';
    if(regional+afara===0) risc='Scăzut';
    else if(prezent+local===0) risc='Ridicat';
    else risc='Mediu';
  }
  return {medici,b9,b6,b3,prezent,local,regional,afara,acoperire,risc,status};
}

/* ===================== LOGIN / SESSION ===================== */
async function doLogin(){
  const raw=document.getElementById('codeInput').value.trim();
  const err=document.getElementById('loginErr');
  err.textContent='Se verifică...';
  if(BACKEND.enabled && BACKEND.url){
    // Validate on the server (real access control)
    BACKEND.code=raw;
    try{
      const r=await api('auth',{});
      SESSION={role:r.role, clinic:r.clinic||null, region:r.region||null, clinics:r.clinics||null};
      // fire the independent loads in parallel (config, all program data, roster)
      await Promise.all([ loadClinicsConfig(), primeData(), loadRoster(), loadRiscOverride() ]);
    }catch(e){
      BACKEND.code=null;
      err.textContent='Cod invalid sau server indisponibil. Verifică și încearcă din nou.';
      return;
    }
  } else {
    // Local fallback (demo mode)
    const code=raw.toLowerCase();
    await loadClinicsConfig();
    if(code===CENTRAL_CODE){ SESSION={role:'central',clinic:null}; }
    else{
      const hit=Object.entries(CODES).find(([cl,c])=>String(c).toLowerCase()===code);
      if(!hit){ err.textContent='Cod invalid. Verifică și încearcă din nou.'; return; }
      SESSION={role:'clinic',clinic:hit[0]};
    }
  }
  err.textContent='';
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  initApp();
}
async function logout(){ await flushAutosave(); SESSION=null; location.reload(); }

document.getElementById('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

/* ===================== APP INIT ===================== */
async function initApp(){
  // week selector

function buildTabs(){

function upd(i,field,val){
  editRows[i][field]=val; editRows[i]._override=true;

  // propagate to Matrice/Medici CAS and all other clinics.
  if((field==='fee'||field==='suma') && editRows[i].medic){
    const name=editRows[i].medic;
    if(ROSTER){ let ri=ROSTER.findIndex(m=>m.medic===name);
      if(ri<0){ ROSTER.push({medic:name,fee:0,suma:0}); ri=ROSTER.length-1; }

  const exact=similarMedics(n,(ROSTER||[]).map(m=>m.medic)).find(s=>s.kind==='identic');

// load ALL clinics for current week. Fast path reads from the snapshot with inheritance.
async function loadAllClinics(){
  await primeData();
  const data={};
  if(BACKEND.enabled && BACKEND.url){
    const idx=WEEKS.indexOf(curWeek);
    for(const c of CLINICS){
      // find this week's data, else most recent prior week, else demo seed
      let rows=(SERVER_DATA[curWeek]&&SERVER_DATA[curWeek][c])?SERVER_DATA[curWeek][c]:null;
      if(!rows){ for(let i=idx-1;i>=0;i--){ const w=WEEKS[i];
        if(SERVER_DATA[w]&&SERVER_DATA[w][c]){ rows=SERVER_DATA[w][c]; break; } } }
      if(!rows) rows=DEMO.demo[c]||[];
      data[c]=rows;
    }
    return data;
  }
  if(cache[curWeek]) delete cache[curWeek];
  for(const c of CLINICS){ data[c]=await loadWeekClinic(curWeek,c); }
  return data;
}

// Risk evolution: for every week from the first up to current, compute each clinic's risk level.
// Fast path: read directly from the in-memory snapshot, carrying forward the last known
// schedule per clinic (inheritance) without thousands of async calls or deep copies.
async function riskHistory(){
  await primeData();
  const idx=WEEKS.indexOf(curWeek);
  const weeks=WEEKS.slice(0,idx+1);
  const hist={}; CLINICS.forEach(c=>hist[c]={});
  if(BACKEND.enabled && BACKEND.url){
    // carry-forward over the snapshot (no per-cell fetch)
    const last={}; // clinic -> last seen rows
    for(const w of weeks){
      for(const c of CLINICS){
        const sr=(SERVER_DATA[w]&&SERVER_DATA[w][c])?SERVER_DATA[w][c]:null;
        if(sr) last[c]=sr;                       // explicit data for this week
        const rows=sr || last[c] || (DEMO.demo[c]||[]); // else inherit last, else demo seed
        hist[c][w]=effectiveRisc(w,c,clinicStats(rows).risc);
      }
    }
    return {weeks,hist};
  }
  // local mode fallback (original behavior)
  for(const w of weeks){
    for(const c of CLINICS){
      const rows=await loadWeekClinic(w,c);
      hist[c][w]=effectiveRisc(w,c,clinicStats(rows).risc);
    }
  }
  return {weeks,hist};
}

function passesFilter(n){
  const m=VIEW_MED[n]; const f=getFilters();
  if(f.q && !n.toLowerCase().includes(f.q)) return false;
  if(f.clinic && !(m.per[f.clinic]>0)) return false;
  if(f.band){ const b=+f.band; if(!Object.values(m.per).some(v=>v===b)) return false; }
  if(f.flag==='multi' && m.nClinici<2) return false;
  if(f.flag==='unassigned' && m.nClinici>0) return false;
  if(f.flag==='assigned' && m.nClinici===0) return false;
  if(f.flag==='warn' && !(m.warn&&m.warn.length)) return false;
  return true;
}
function applyFilters(){
  const visible=VIEW_NAMES.filter(passesFilter);
  // rebuild body
  const tbl=document.getElementById(VIEW_MODE==='cas'?'casTbl':'mxTbl');
  if(tbl){
    const tb=tbl.querySelector('tbody');
    tb.innerHTML=visible.map(n=>medRow(n)).join('')+colTotRow(visible);

  const sumEl=document.getElementById('viewSummary');
  if(sumEl){
    const totSuma=visible.reduce((s,n)=>s+(VIEW_MED[n].suma||0),0);
    const nMulti=visible.filter(n=>VIEW_MED[n].nClinici>1).length;
    const nAsig=visible.filter(n=>VIEW_MED[n].nClinici>0).length;
    sumEl.innerHTML=`<b>${visible.length}</b> medici afișați &nbsp;·&nbsp; <b>${nAsig}</b> cu program &nbsp;·&nbsp; <b>${nMulti}</b> în 2+ clinici &nbsp;·&nbsp; sumă fixă: <b>${totSuma.toLocaleString('ro-RO')}</b> RON/lună`;
  }
  // alerts band: only possible-duplicate warnings remain
  const alEl=document.getElementById('viewAlerts');
  if(alEl){
    const flagged=VIEW_NAMES.filter(n=>VIEW_MED[n].warn&&VIEW_MED[n].warn.length);
    if(flagged.length){

    } else { alEl.style.display='none'; alEl.innerHTML=''; }

}

let ZOOM=1;
const ZOOM_STEPS=[0.4,0.5,0.6,0.7,0.8,0.9,1];
function applyZoom(){
  const tbl=document.getElementById(VIEW_MODE==='cas'?'casTbl':'mxTbl');
  if(!tbl)return;
  tbl.style.transformOrigin='top left';
  tbl.style.transform='scale('+ZOOM+')';
  tbl.style.width=(100/ZOOM)+'%';
  const zv=document.getElementById('zoomVal'); if(zv)zv.textContent=Math.round(ZOOM*100)+'%';
}
function setZoom(dir){
  let i=ZOOM_STEPS.indexOf(ZOOM); if(i<0)i=ZOOM_STEPS.length-1;
  i=Math.max(0,Math.min(ZOOM_STEPS.length-1,i+dir));
  ZOOM=ZOOM_STEPS[i]; applyZoom();
}
function zoomFit(){
  const wrap=document.querySelector('.matrix-wrap'); const tbl=document.getElementById(VIEW_MODE==='cas'?'casTbl':'mxTbl');
  if(!wrap||!tbl)return;
  tbl.style.transform='scale(1)'; tbl.style.width='';
  const natural=tbl.scrollWidth, avail=wrap.clientWidth;
  ZOOM=Math.max(0.3,Math.min(1, avail/natural));
  applyZoom();
}

async function cyclePredispozitie(name){

// Rename a predefined supraspecializare everywhere it is used (propagates to all medics)
async function ssEditOption(idx){
  const old=NOMEN.supraspec[idx]; if(old==null) return;
  const nv=prompt('Redenumește supraspecializarea (se modifică automat la toți medicii care o au):',old);
  if(nv===null) return;
  const val=nv.trim(); if(!val){ return; }
  if(val===old){ return; }
  // duplicate guard
  if(NOMEN.supraspec.some((s,j)=>j!==idx && normName(s)===normName(val))){ toast('Există deja o supraspecializare cu acest nume','err'); return; }
  NOMEN.supraspec[idx]=val;
  // propagate rename across ROSTER
  let changed=0;
  ROSTER.forEach(r=>{
    if(!r.supraspec) return;
    const arr=r.supraspec.split(',').map(s=>s.trim()).filter(Boolean);
    let hit=false;
    const out=arr.map(s=>{ if(normName(s)===normName(old)){ hit=true; return val; } return s; });
    if(hit){ r.supraspec=out.join(', '); changed++; }
  });
  await saveNomen();
  if(changed){ await saveRoster(); }
  // refresh views
  if(VIEW_MED){ Object.values(VIEW_MED).forEach(m=>{ if(m.supraspec){ m.supraspec=m.supraspec.split(',').map(s=>s.trim()).map(s=>normName(s)===normName(old)?val:s).join(', '); } }); }
  toast('Redenumit'+(changed?` (actualizat la ${changed} medici)`:''),'ok');
  openSupraspec(_ssMedic);
  if(VIEW_MODE) applyFilters();
}
// Remove a supraspecializare from the list and from all medics
async function ssDelOption(idx){
  const old=NOMEN.supraspec[idx]; if(old==null) return;
  const ok=await confirmDialog('Ștergere supraspecializare','Sigur scoți „'+old+'” din listă? Se va elimina și de la toți medicii care o au.','Șterge','Anulează');
  if(!ok) return;
  NOMEN.supraspec.splice(idx,1);
  let changed=0;
  ROSTER.forEach(r=>{
    if(!r.supraspec) return;
    const arr=r.supraspec.split(',').map(s=>s.trim()).filter(Boolean);
    const out=arr.filter(s=>normName(s)!==normName(old));
    if(out.length!==arr.length){ r.supraspec=out.join(', '); changed++; }
  });
  await saveNomen();
  if(changed){ await saveRoster(); }
  if(VIEW_MED){ Object.values(VIEW_MED).forEach(m=>{ if(m.supraspec){ m.supraspec=m.supraspec.split(',').map(s=>s.trim()).filter(s=>normName(s)!==normName(old)).join(', '); } }); }
  toast('Șters'+(changed?` (eliminat de la ${changed} medici)`:''),'ok');
  openSupraspec(_ssMedic);
  if(VIEW_MODE) applyFilters();
}

function exportView(fmt){
  const visible=VIEW_NAMES.filter(passesFilter);
  const pdRO={'verde':'Da','galben':'Cu prudență','rosu':'Nu','':''};
  const head=['Medic','Fee %','Sumă fixă (RON/lună)','Predispoziție alocări','Supraspecializare','Nr. clinici',...CLINICS];
  const rows=visible.map(n=>{const m=VIEW_MED[n];
    return [n,(m.fee*100).toFixed(0)+'%',m.suma||0,pdRO[m.predispozitie||'']||'',m.supraspec||'',m.nClinici,...CLINICS.map(c=>m.per[c]||'')];});
  const title=(VIEW_MODE==='cas'?'Medici_CAS':'Matrice_Generala')+'_'+curWeek;
  if(fmt==='csv'){
    const csv=[head,...rows].map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
    dl(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),title+'.csv');
  }else{
    const ws=XLSX.utils.aoa_to_sheet([head,...rows]);
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,VIEW_MODE==='cas'?'Medici CAS':'Matrice');
    XLSX.writeFile(wb,title+'.xlsx');
  }
  toast('Export '+fmt.toUpperCase()+' generat','ok');

function dl(blob,name){
  try{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=name; a.rel='noopener'; a.style.display='none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },1500);
  }catch(e){
    // Fallback: open as data URI in a new tab if blob download is blocked
    try{ const fr=new FileReader(); fr.onload=()=>window.open(fr.result,'_blank'); fr.readAsDataURL(blob); }catch(_){ toast('Descărcarea nu a putut fi pornită','err'); }
  }
}

function clinicCodeFor(name){
  // generate a simple code: first 4 letters (no diacritics) + 2026
  const base=normName(name).replace(/[^a-z]/g,'').slice(0,4)||'clin';
  let code=base+'2026', i=1;
  while(Object.values(CODES).includes(code)){ code=base+(2026)+(++i); }
  return code;
}

// Build medic map seeded from full master roster (118), overlaid with clinic assignments
// Live roster = embedded master + persisted edits (fee/suma changes, additions, deletions, renames)
let ROSTER=null;
const ROSTER_KEY=STORE_PREFIX+'roster';
async function loadRoster(){
  if(ROSTER) return ROSTER;
  if(BACKEND.enabled && BACKEND.url){
    try{ const r=await api('loadRoster',{});
      if(r.roster && r.roster.length){ ROSTER=r.roster; return ROSTER; }
      // sheet roster empty: seed from embedded master and push to server (admin only)
      ROSTER=MASTER_MEDICS.map(m=>({...m}));
      if(SESSION&&SESSION.role==='central'){ try{ await api('saveRoster',{roster:ROSTER}); }catch(e){} }
      return ROSTER;
    }catch(e){ ROSTER=MASTER_MEDICS.map(m=>({...m})); return ROSTER; }
  }
  let saved=null;
  try{ const r=await STORE.get(ROSTER_KEY); if(r&&r.value) saved=JSON.parse(r.value); }catch(e){}
  ROSTER = saved || MASTER_MEDICS.map(m=>({...m}));
  return ROSTER;
}
async function saveRoster(){
  if(BACKEND.enabled && BACKEND.url){
    try{ await api('saveRoster',{roster:ROSTER}); return true; }catch(e){ toast('Salvare listă medici eșuată: '+e.message,'err'); return false; }
  }
  try{ await STORE.set(ROSTER_KEY,JSON.stringify(ROSTER)); return true; }catch(e){ return false; }

/* ===================== RECRUTARE (CRM) ===================== */
let RECRUTARE=null; // array of candidate records
const RECRUT_STATUSES=['Necontactat','Contactat','Ofertat','Ofertat - asteptam feedback','De revenit','Oferta acceptata','Oferta refuzata','Pending','Precontract semnat','Contract semnat','Colaborare activa','Incetarea colaborarii','In pepiniera','Refuza discutii','Mapat fara date contact','Nou'];
const RECRUT_STATUS_CLASS={ // status -> semantic color group
  'Contract semnat':'rs-green','Colaborare activa':'rs-green','Oferta acceptata':'rs-green','Precontract semnat':'rs-green',
  'Contactat':'rs-blue','Ofertat':'rs-blue','Ofertat - asteptam feedback':'rs-blue','Pending':'rs-blue','De revenit':'rs-amber','Nou':'rs-blue','In pepiniera':'rs-amber',
  'Necontactat':'rs-grey','Mapat fara date contact':'rs-grey',
  'Oferta refuzata':'rs-red','Refuza discutii':'rs-red','Incetarea colaborarii':'rs-red'
};
let RF={q:'',categorie:'',specializare:'',judet:'',status:'',lead:''}; // recruitment filters
let RSORT={col:'nume',dir:1}; // sort state

async function loadRecrutare(){
  if(RECRUTARE) return RECRUTARE;
  if(BACKEND.enabled && BACKEND.url){
    try{ const r=await api('loadRecrutare',{}); RECRUTARE=r.records||[]; }catch(e){ RECRUTARE=[]; }
  } else { RECRUTARE = (window.RECRUT_DEMO||[]); }
  return RECRUTARE;
}
function recrutById(id){ return (RECRUTARE||[]).find(r=>r.id===id); }
async function updRecrutareField(id,field,val){
  const rec=recrutById(id); if(!rec) return;
  rec[field]=val;
  if(BACKEND.enabled && BACKEND.url){
    const fields={}; fields[field]=val;
    try{ await api('updRecrutare',{id,fields}); setStatus(true); }catch(e){ toast('Salvare eșuată: '+e.message,'err'); }
  }
}

function recrutPasses(r){
  if(RF.q){ const q=RF.q.toLowerCase(); const hay=(r.nume+' '+r.oras+' '+r.competente+' '+r.email+' '+r.telefon).toLowerCase(); if(!hay.includes(q)) return false; }
  if(RF.categorie && !String(r.categorie||'').split(',').map(s=>s.trim()).includes(RF.categorie)) return false;
  if(RF.specializare && !String(r.specializare||'').split(',').map(s=>s.trim()).includes(RF.specializare)) return false;
  if(RF.judet && r.judet!==RF.judet) return false;
  if(RF.status && r.status!==RF.status) return false;
  if(RF.lead && r.lead!==RF.lead) return false;
  return true;
}
function recrutSorted(list){
  const c=RSORT.col, d=RSORT.dir;
  if(c==='status'){
    // sort by pipeline stage order (RECRUT_STATUSES index), empty last
    const rank=s=>{const i=RECRUT_STATUSES.indexOf(s); return i<0?999:i;};
    return list.slice().sort((a,b)=>(rank(a.status)-rank(b.status))*d);
  }
  return list.slice().sort((a,b)=>{
    const x=String(a[c]||'').toLowerCase(), y=String(b[c]||'').toLowerCase();
    return x<y?-1*d : x>y?1*d : 0;
  });
}
function setSort(col){ if(RSORT.col===col) RSORT.dir*=-1; else {RSORT.col=col;RSORT.dir=1;} applyRecFilters(); }
function sortArrow(col){ return RSORT.col===col ? (RSORT.dir>0?' ▲':' ▼') : ''; }

async function renderRecrutare(){
  const v=document.getElementById('view');
  v.innerHTML='<div class="empty-state">Se încarcă baza de recrutare…</div>';
  await loadNomen();
  await loadRecrutare();
  const recs=RECRUTARE||[];
  const uniq=(key)=>[...new Set(recs.flatMap(r=>String(r[key]||'').split(',').map(s=>s.trim())).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'ro'));
  const judete=uniq('judet'), leads=uniq('lead');
  const categorii=[...new Set([...(NOMEN.categorie||[]), ...recs.flatMap(r=>String(r.categorie||'').split(',').map(s=>s.trim())).filter(Boolean)])];
  const specializari=[...new Set([...(NOMEN.specializare||[]), ...recs.flatMap(r=>String(r.specializare||'').split(',').map(s=>s.trim())).filter(Boolean)])].sort((a,b)=>a.localeCompare(b,'ro'));
  const isAdmin=SESSION&&SESSION.role==='central';

  v.innerHTML=`
    <div class="dash-head"><div><h2 style="font-size:20px;color:var(--primary)">Recrutare medici</h2>
      <div style="color:var(--gray-mid);font-size:13px;margin-top:2px">Pipeline candidați · ${recs.length} în bază${SESSION.role==='region'?' (regiunea ta)':''}</div></div>
      <div class="spacer" style="flex:1"></div>
      <button class="btn-add" onclick="addCandidat()">+ Adaugă candidat</button>
      ${isAdmin?`<label class="btn-export" style="cursor:pointer">⬆ Importă bază<input type="file" id="recImport" accept=".json,.csv" style="display:none" onchange="importRecrutare(this)"></label>`:''}
      <button class="btn-export" onclick="exportRecrutare()">⬇ Export</button>
    </div>
    <div id="recStats" class="rec-stats"></div>
    <div class="card">
      <div class="filter-bar">
        <input class="flt" id="rfSearch" placeholder="🔍 Caută nume, oraș, competențe…" value="${esc(RF.q)}" oninput="setRF('q',this.value)">
        <select class="flt" id="rfCat" onchange="setRF('categorie',this.value)"><option value="">Toate categoriile</option>${categorii.map(c=>`<option ${c===RF.categorie?'selected':''}>${esc(c)}</option>`).join('')}</select>
        <select class="flt" id="rfSpec" onchange="setRF('specializare',this.value)"><option value="">Toate specializările</option>${specializari.map(sp=>`<option ${sp===RF.specializare?'selected':''}>${esc(sp)}</option>`).join('')}</select>
        <select class="flt" id="rfJud" onchange="setRF('judet',this.value)"><option value="">Toate județele</option>${judete.map(j=>`<option ${j===RF.judet?'selected':''}>${esc(j)}</option>`).join('')}</select>
        <select class="flt" id="rfStatus" onchange="setRF('status',this.value)"><option value="">Toate statusurile</option>${RECRUT_STATUSES.map(s=>`<option ${s===RF.status?'selected':''}>${esc(s)}</option>`).join('')}</select>
        <select class="flt" id="rfLead" onchange="setRF('lead',this.value)"><option value="">Toți responsabilii</option>${leads.map(l=>`<option ${l===RF.lead?'selected':''}>${esc(l)}</option>`).join('')}</select>
        <button class="flt-clear" onclick="clearRF()">Resetează</button>
      </div>
      <div class="rec-summary" id="recSummary"></div>
      <div class="matrix-wrap scroll-x"><table id="recTbl" class="mx-compact rec-tbl">
        <colgroup><col class="c-nume"><col class="c-spec"><col class="c-grad"><col class="c-comp"><col class="c-clin"><col class="c-jud"><col class="c-resp"><col class="c-tel"><col class="c-mail"><col class="c-status"></colgroup>
        <thead>
        <tr><th class="rec-sort" onclick="setSort('nume')">Nume${sortArrow('nume')}</th>
        <th class="rec-sort" onclick="setSort('specializare')">Specialitate${sortArrow('specializare')}</th>
        <th class="rec-sort" onclick="setSort('categorie')">Grad${sortArrow('categorie')}</th>
        <th>Competențe</th>
        <th class="rec-sort" onclick="setSort('clinica')">Clinică${sortArrow('clinica')}</th>
        <th class="rec-sort" onclick="setSort('judet')">Județ${sortArrow('judet')}</th>
        <th class="rec-sort" onclick="setSort('lead')">Responsabil${sortArrow('lead')}</th>
        <th>Telefon</th>
        <th>Email</th>
        <th class="rec-sort" onclick="setSort('status')">Status${sortArrow('status')}</th></tr>
      </thead><tbody></tbody></table></div>
    </div>`;
  applyRecFilters();
}

function setRF(k,v){ RF[k]=v; applyRecFilters(); }
function clearRF(){ RF={q:'',categorie:'',specializare:'',judet:'',status:'',lead:''}; renderRecrutare(); }

function applyRecFilters(){
  const recs=recrutSorted((RECRUTARE||[]).filter(recrutPasses));
  const tb=document.querySelector('#recTbl tbody');
  if(tb) tb.innerHTML = recs.map(recrutRow).join('') || `<tr><td colspan="8" style="text-align:center;color:var(--gray-mid);padding:30px">Niciun candidat pentru filtrele selectate.</td></tr>`;
  const sumEl=document.getElementById('recSummary');
  if(sumEl) sumEl.innerHTML=`<b>${recs.length}</b> candidați afișați din ${(RECRUTARE||[]).length}`;
  const stEl=document.getElementById('recStats');
  if(stEl){
    const g={semnat:0,activ:0,inDiscutie:0,necontactat:0,refuzat:0};
    recs.forEach(r=>{const c=RECRUT_STATUS_CLASS[r.status]||'rs-grey';
      if(r.status==='Contract semnat'||r.status==='Precontract semnat')g.semnat++;
      else if(r.status==='Colaborare activa')g.activ++;
      else if(c==='rs-blue'||c==='rs-amber')g.inDiscutie++;
      else if(c==='rs-red')g.refuzat++;
      else g.necontactat++;
    });
    stEl.innerHTML=`
      <div class="rec-stat"><div class="rs-num" style="color:var(--accent)">${g.activ}</div><div class="rs-lbl">Colaborări active</div></div>
      <div class="rec-stat"><div class="rs-num" style="color:var(--primary)">${g.semnat}</div><div class="rs-lbl">Contracte semnate</div></div>
      <div class="rec-stat"><div class="rs-num" style="color:var(--secondary)">${g.inDiscutie}</div><div class="rs-lbl">În discuție</div></div>
      <div class="rec-stat"><div class="rs-num" style="color:var(--gray-mid)">${g.necontactat}</div><div class="rs-lbl">Necontactați</div></div>
      <div class="rec-stat"><div class="rs-num" style="color:var(--bad)">${g.refuzat}</div><div class="rs-lbl">Refuzați</div></div>`;
  }
}

function recrutRow(r){
  const idE=r.id;
  const stCls=RECRUT_STATUS_CLASS[r.status]||'rs-grey';
  const telCell=`<div class="rec-inline"><input class="rec-mini" id="tel-${idE}" value="${esc(fmtPhone(r.telefon||''))}" placeholder="telefon" inputmode="tel"><button class="rec-isave" onclick="saveField('${idE}','telefon','tel-${idE}',this)" title="Salvează">✓</button></div>`;
  const mailCell=`<div class="rec-inline"><input class="rec-mini" id="mail-${idE}" value="${esc(r.email||'')}" placeholder="email"><button class="rec-isave" onclick="saveField('${idE}','email','mail-${idE}',this)" title="Salvează">✓</button></div>`;
  const statusSel=`<select class="rec-status ${stCls}" onchange="changeStatus('${idE}',this.value,this)">
    <option value="">—</option>${RECRUT_STATUSES.map(s=>`<option ${s===r.status?'selected':''}>${esc(s)}</option>`).join('')}
    <option value="__add__">+ adaugă status…</option></select>`;
  const catTags=(r.categorie||'').split(',').map(s=>s.trim()).filter(Boolean);
  const catChip=`<span class="ss-chip" onclick="openMulti('${idE}','categorie')" title="${esc(catTags.join(', ')||'click')}">${catTags.join(', ')||'<span style="color:var(--gray-mid)">—</span>'}</span>`;
  const compTags=(r.competente||'').split(',').map(s=>s.trim()).filter(Boolean);
  const compLabel=compTags.length?compTags.slice(0,2).join(', ')+(compTags.length>2?` +${compTags.length-2}`:''):'<span style="color:var(--gray-mid)">—</span>';
  const compChip=`<span class="ss-chip" onclick="openMulti('${idE}','competente')" title="${esc(compTags.join(', ')||'click')}">${compLabel}</span>`;
  const leadTags=(r.lead||'').split(',').map(s=>s.trim()).filter(Boolean);
  const leadLabel=leadTags.length?leadTags.slice(0,2).join(', ')+(leadTags.length>2?` +${leadTags.length-2}`:''):'<span style="color:var(--gray-mid)">—</span>';
  const leadChip=`<span class="ss-chip" onclick="openMulti('${idE}','lead')" title="${esc(leadTags.join(', ')||'click')}">${leadLabel}</span>`;
  const specTags=(r.specializare||'').split(',').map(s=>s.trim()).filter(Boolean);
  const specChip=`<span class="ss-chip" onclick="openMulti('${idE}','specializare')" title="${esc(specTags.join(', ')||'click')}">${specTags.join(', ')||'<span style="color:var(--gray-mid)">—</span>'}</span>`;
  const nNotes=parseNotes(r).length;
  const noteBadge=nNotes?`<span class="note-badge" title="${nNotes} notițe">📝 ${nNotes}</span>`:'<span class="note-badge note-badge-empty">📝</span>';
  return `<tr>
    <td class="mx-name"><span class="rec-name-link" onclick="openNotesDrawer('${idE}')" title="Click pentru notițe">${esc(r.nume)}</span> ${noteBadge}<button class="rec-del" onclick="deleteCandidat('${idE}')" title="Șterge candidatul din bază">✕</button></td>
    <td>${specChip}</td>
    <td>${catChip}</td>
    <td>${compChip}</td>
    <td style="font-size:12.5px">${esc(r.clinica||'')||'<span class="cp-none">—</span>'}</td>
    <td style="font-size:12.5px">${esc(r.judet||'')||'<span class="cp-none">—</span>'}</td>
    <td>${leadChip}</td>
    <td>${telCell}</td>
    <td>${mailCell}</td>
    <td>${statusSel}</td></tr>`;
}
// Notes stored as JSON array of {d,t}. Back-compat: plain string -> single entry.
function parseNotes(r){
  const n=r.notite||'';
  if(typeof n==='string' && n.trim().startsWith('[')){ try{ const a=JSON.parse(n); return Array.isArray(a)?a:[]; }catch(e){} }
  if(typeof n==='string' && n.trim()){ return [{d:'',t:n.trim()}]; }
  return [];
}
function nowStamp(){ const d=new Date(); const p=x=>String(x).padStart(2,'0'); return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`; }
async function persistNotes(rec){
  if(BACKEND.enabled && BACKEND.url){
    try{ await api('updRecrutare',{id:rec.id,fields:{notite:rec.notite}}); setStatus(true); }
    catch(e){ toast('Salvare notiță eșuată: '+e.message,'err'); }
  }
}
// Save a single field (telefon/email) with a tiny check-button
function saveField(id,field,inputId,btn){
  let val=(document.getElementById(inputId)||{}).value||'';
  if(field==='telefon'){ val=fmtPhone(val); const el=document.getElementById(inputId); if(el) el.value=val; }
  const rec=recrutById(id); if(!rec) return;
  rec[field]=val;
  if(btn){ btn.textContent='✓'; btn.classList.add('isave-ok'); setTimeout(()=>btn.classList.remove('isave-ok'),1200); }
  if(BACKEND.enabled && BACKEND.url){
    const f={}; f[field]=val;
    api('updRecrutare',{id,fields:f}).then(()=>setStatus(true)).catch(e=>toast('Salvare eșuată: '+e.message,'err'));
  }
}

/* ===== Notițe — drawer lateral la click pe nume ===== */
let _drawerId=null;
function openNotesDrawer(id){
  _drawerId=id;
  const rec=recrutById(id); if(!rec) return;
  document.getElementById('ndTitle').textContent=rec.nume;
  document.getElementById('ndSub').textContent=[rec.specializare,rec.categorie,rec.clinica].filter(Boolean).join(' · ');
  drawNotesDrawer();
  const ov=document.getElementById('noteDrawer');
  ov.classList.add('open');
  setTimeout(()=>{const e=document.getElementById('ndInput'); if(e) e.focus();},150);
}
function closeNotesDrawer(){ document.getElementById('noteDrawer').classList.remove('open'); _drawerId=null; }
function drawNotesDrawer(){
  const rec=recrutById(_drawerId); if(!rec) return;
  const notes=parseNotes(rec);
  const list=document.getElementById('ndList');
  if(!notes.length){ list.innerHTML='<div class="nd-empty">Nicio notiță încă. Adaugă prima mai jos.</div>'; }
  else list.innerHTML=notes.map((n,i)=>`<div class="nd-item">
    <div class="nd-item-h"><span class="nd-date">${esc(n.d||'')}</span>
      <span class="nd-acts"><button class="ico" title="Editează" onclick="drawerEditNote(${i})">✎</button><button class="ico ico-del" title="Șterge" onclick="drawerDelNote(${i})">×</button></span></div>
    <div class="nd-text">${esc(n.t||'')}</div></div>`).reverse().join('');
}
function drawerAddNote(){
  const inp=document.getElementById('ndInput'); const t=(inp.value||'').trim(); if(!t) return;
  const rec=recrutById(_drawerId); const notes=parseNotes(rec);
  notes.push({d:nowStamp(),t}); rec.notite=JSON.stringify(notes);
  inp.value=''; drawNotesDrawer(); persistNotes(rec); rerenderRow(_drawerId);
}
function drawerEditNote(i){
  const rec=recrutById(_drawerId); const notes=parseNotes(rec);
  if(!notes[i]) return;
  const nv=prompt('Editează notița:',notes[i].t);
  if(nv===null) return;
  notes[i].t=nv.trim(); rec.notite=JSON.stringify(notes);
  drawNotesDrawer(); persistNotes(rec); rerenderRow(_drawerId);
}
function drawerDelNote(i){
  const rec=recrutById(_drawerId); const notes=parseNotes(rec);
  notes.splice(i,1); rec.notite=JSON.stringify(notes);
  drawNotesDrawer(); persistNotes(rec); rerenderRow(_drawerId);
}
// re-render just one row in place (keeps scroll position)
function rerenderRow(id){
  const rec=recrutById(id); if(!rec) return;
  const tb=document.querySelector('#recTbl tbody'); if(!tb) return;
  const rows=[...tb.querySelectorAll('tr')];
  const target=rows.find(tr=>tr.querySelector(`#tel-${id}`));
  if(target){ const tmp=document.createElement('tbody'); tmp.innerHTML=recrutRow(rec); target.replaceWith(tmp.firstElementChild); }
}
function flashSaved(btn){
  if(!btn) return;
  const orig=btn.textContent; btn.textContent='Salvat ✓'; btn.classList.add('saved-flash');
  setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('saved-flash'); },1400);
}
// Romanian phone: ensure leading 0 for 9-digit local numbers
function fmtPhone(p){
  let s=String(p||'').trim();
  if(!s) return '';
  const digits=s.replace(/[^\d]/g,'');
  if(digits.length===9 && !s.startsWith('0') && !s.startsWith('+')) return '0'+s;
  return s;
}
function changeStatus(id,val,sel){
  if(val==='__add__'){
    const nv=prompt('Adaugă un status nou:');
    if(nv&&nv.trim()){
      const v=nv.trim();
      if(!RECRUT_STATUSES.includes(v)){ RECRUT_STATUSES.push(v); RECRUT_STATUS_CLASS[v]=RECRUT_STATUS_CLASS[v]||'rs-grey'; }
      updRecrutareField(id,'status',v);
    }
    renderRecrutare(); return;
  }
  updRecrutareField(id,'status',val);
  const cls=RECRUT_STATUS_CLASS[val]||'rs-grey';
  if(sel){ sel.className='rec-status '+cls; }
  refreshRecStats();
}
function refreshRecStats(){
  const recs=(RECRUTARE||[]).filter(recrutPasses);
  const stEl=document.getElementById('recStats'); if(!stEl) return;
  const g={semnat:0,activ:0,inDiscutie:0,necontactat:0,refuzat:0};
  recs.forEach(r=>{const c=RECRUT_STATUS_CLASS[r.status]||'rs-grey';
    if(r.status==='Contract semnat'||r.status==='Precontract semnat')g.semnat++;
    else if(r.status==='Colaborare activa')g.activ++;
    else if(c==='rs-blue'||c==='rs-amber')g.inDiscutie++;
    else if(c==='rs-red')g.refuzat++;
    else g.necontactat++;
  });
  stEl.innerHTML=`
    <div class="rec-stat"><div class="rs-num" style="color:var(--accent)">${g.activ}</div><div class="rs-lbl">Colaborări active</div></div>
    <div class="rec-stat"><div class="rs-num" style="color:var(--primary)">${g.semnat}</div><div class="rs-lbl">Contracte semnate</div></div>
    <div class="rec-stat"><div class="rs-num" style="color:var(--secondary)">${g.inDiscutie}</div><div class="rs-lbl">În discuție</div></div>
    <div class="rec-stat"><div class="rs-num" style="color:var(--gray-mid)">${g.necontactat}</div><div class="rs-lbl">Necontactați</div></div>
    <div class="rec-stat"><div class="rs-num" style="color:var(--bad)">${g.refuzat}</div><div class="rs-lbl">Refuzați</div></div>`;
}

// Add a new candidate
async function addCandidat(){
  const nume=prompt('Nume și prenume candidat:');
  if(!nume||!nume.trim()) return;
  const id='r'+Date.now();
  const rec={id,nume:nume.trim(),categorie:'',clinica:'',lead:'',competente:'',judet:'',oras:'',telefon:'',email:'',status:'Nou',observatii:'',notite:''};
  RECRUTARE.unshift(rec);
  if(BACKEND.enabled && BACKEND.url){ try{ await api('saveRecrutare',{records:RECRUTARE}); }catch(e){ toast('Salvare eșuată','err'); } }
  toast('Candidat adăugat','ok');
  renderRecrutare();
}

async function deleteCandidat(id){
  const rec=recrutById(id); if(!rec) return;
  const ok=await confirmDialog('Ștergere candidat','Sigur vrei să ștergi definitiv pe „'+rec.nume+'” din baza de recrutare? Acțiunea nu poate fi anulată.','Șterge','Anulează');
  if(!ok) return;
  const i=RECRUTARE.findIndex(x=>x.id===id);
  if(i>=0) RECRUTARE.splice(i,1);
  if(BACKEND.enabled && BACKEND.url){
    try{ await api('delRecrutare',{id}); }catch(e){ toast('Ștergere eșuată: '+e.message,'err'); }
  }
  toast('Candidat șters','ok');
  renderRecrutare();  // re-render + recalculează KPI-urile și contorul „în bază"
}

async function importRecrutare(input){
  const file=input.files&&input.files[0]; if(!file) return;
  const ok=await confirmDialog('Import bază recrutare','Asta va ÎNLOCUI complet baza de recrutare curentă cu datele din fișier ('+file.name+'). Continui?','Importă','Anulează');
  if(!ok){ input.value=''; return; }
  try{
    const txt=await file.text();
    let recs;
    if(/\.csv$/i.test(file.name)){ recs=csvToRecords(txt); }
    else { recs=JSON.parse(txt); }
    if(!Array.isArray(recs)) throw new Error('Format invalid');
    // ensure ids
    recs.forEach((r,i)=>{ if(!r.id) r.id='r'+(i+1); });
    RECRUTARE=recs;
    if(BACKEND.enabled && BACKEND.url){ await api('saveRecrutare',{records:recs}); }
    toast(recs.length+' candidați importați','ok');
    renderRecrutare();
  }catch(e){ toast('Import eșuat: '+e.message,'err'); }
  input.value='';
}
function csvToRecords(txt){
  const lines=txt.split(/\r?\n/).filter(Boolean);
  const head=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const cells=line.match(/("([^"]|"")*"|[^,]*)/g).filter((_,i,a)=>i<head.length);
    const rec={}; head.forEach((h,i)=>rec[h]=(cells[i]||'').replace(/^"|"$/g,'').replace(/""/g,'"'));
    return rec;
  });
}
function exportRecrutare(){
  const recs=(RECRUTARE||[]).filter(recrutPasses);
  const cols=['nume','categorie','clinica','lead','specializare','competente','grad','judet','oras','telefon','email','status','observatii','notite'];
  const head=['Nume','Categorie','Clinică','Responsabil','Specializare','Competențe','Grad','Județ','Oraș','Telefon','Email','Status','Observații','Notițe'];
  const rows=recs.map(r=>cols.map(c=>r[c]||''));
  const csv=[head,...rows].map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
  dl(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),'Recrutare_'+curWeek+'.csv');
  toast('Export generat','ok');
}


function buildMedMap(data){
  const med={};
  // seed roster (includes unassigned medics) — uses live ROSTER; master attributes are authoritative
  (ROSTER||MASTER_MEDICS).forEach(m=>{ med[m.medic]={fee:m.fee,suma:m.suma,predispozitie:m.predispozitie||'',supraspec:m.supraspec||'',per:{},nClinici:0,nPrezent:0,warn:[]}; });
  // overlay actual clinic schedules — medics scheduled in a clinic propagate automatically into the list
  let autoAdded=[];
  for(const c of CLINICS){ for(const r of (data[c]||[])){
    if(!med[r.medic]){
      med[r.medic]={fee:r.fee||0,suma:r.suma||0,predispozitie:'',supraspec:'',per:{},nClinici:0,nPrezent:0,warn:[]};
      autoAdded.push({medic:r.medic,fee:r.fee||0,suma:r.suma||0});
    }
    const m=med[r.medic];
    const band=casBand(r); m.per[c]=band; m.nPrezent++; if(band>0)m.nClinici++;
  }}
  // persist any auto-added medics into the roster so the list stays in sync with clinic programs
  if(autoAdded.length && ROSTER){
    autoAdded.forEach(a=>{ if(!ROSTER.some(x=>x.medic===a.medic)) ROSTER.push(a); });
    if(SESSION && SESSION.role==='central'){ saveRoster(); }
  }
  // duplicate (similar-name) detection across all medic names
  const names=Object.keys(med);
  names.forEach(n=>{
    const sim=similarMedics(n,names).filter(s=>s.n!==n);
    if(sim.length) med[n].warn.push('Posibilă dublură de nume cu: '+sim.map(s=>s.n).join(', ')+'. Dacă e aceeași persoană, redenumește una dintre variante ca să fie identice.');
  });
  return med;
}
