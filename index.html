<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medima · Medici Medima</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Red+Hat+Display:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --primary:#37008D; --secondary:#7D5DE7; --accent:#2AD1BC;
  --black:#1D1D29; --gray:#E7E3EE; --gray-mid:#8C84A3;
  --bg:#F7F5FB; --white:#fff;
  --ok:#2AD1BC; --warn:#E8A33D; --bad:#E0556E;
  --ink:#180A38; --ink-2:#2B0E6E;
  --line:rgba(55,0,141,.09);
  --ring:rgba(125,93,231,.20);
  --shadow:0 1px 2px rgba(24,10,56,.04),0 10px 28px -14px rgba(55,0,141,.14);
  --shadow-lg:0 24px 64px -20px rgba(24,10,56,.30);
  --surface-2:#FAF9FD; --hover:#FAF8FD; --field:#F3F1F9; --field-2:#FCFBFE;
  --row-line:#F1EFF7; --soft:#FBFAFE;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Red Hat Text',sans-serif;color:var(--black);font-size:14px;line-height:1.45;
  background:
    radial-gradient(1100px 560px at 88% -12%,rgba(125,93,231,.07),transparent 60%),
    radial-gradient(900px 520px at -8% 112%,rgba(42,209,188,.06),transparent 55%),
    var(--bg);
  background-attachment:fixed}
h1,h2,h3{font-family:'Red Hat Display',sans-serif;letter-spacing:-.015em}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;font-size:14px}
.hidden{display:none!important}
::selection{background:rgba(125,93,231,.22)}
:focus-visible{outline:2px solid var(--secondary);outline-offset:2px;border-radius:8px}
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:#CFC8E2;border-radius:8px;border:2px solid transparent;background-clip:content-box}
*::-webkit-scrollbar-thumb:hover{background:#B5ABD4;border:2px solid transparent;background-clip:content-box}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}

/* ===== LOGIN ===== */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  background:
    radial-gradient(1000px 560px at 12% -6%,rgba(125,93,231,.16),transparent 60%),
    radial-gradient(880px 520px at 104% 104%,rgba(42,209,188,.15),transparent 60%),
    linear-gradient(160deg,#F4F1FC 0%,#EDE9F8 55%,#E8F6F2 100%)}
#login::before,#login::after{content:'';position:absolute;border-radius:50%;filter:blur(70px);opacity:.5;pointer-events:none;z-index:0}
#login::before{width:460px;height:460px;left:-140px;top:-120px;background:radial-gradient(circle,rgba(125,93,231,.32),transparent 70%);animation:loginFloat 16s ease-in-out infinite alternate}
#login::after{width:420px;height:420px;right:-120px;bottom:-140px;background:radial-gradient(circle,rgba(42,209,188,.30),transparent 70%);animation:loginFloat 19s ease-in-out infinite alternate-reverse}
@keyframes loginFloat{from{transform:translate(0,0) scale(1)}to{transform:translate(46px,28px) scale(1.08)}}
.login-card{position:relative;z-index:1;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-radius:26px;padding:48px 44px;width:min(430px,92vw);box-shadow:var(--shadow-lg);border:1px solid rgba(255,255,255,.85);
  outline:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.brand-mark{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--primary),var(--secondary));
  display:grid;place-items:center;color:#fff;font-family:'Red Hat Display';font-weight:900;font-size:22px;box-shadow:0 8px 18px -8px rgba(55,0,141,.5)}
.brand-name{font-family:'Red Hat Display';font-weight:900;font-size:24px;color:var(--primary)}
.login-sub{color:var(--gray-mid);margin:4px 0 28px;font-size:13.5px}
.field-label{font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-mid);margin-bottom:8px;display:block}
.code-input{width:100%;padding:14px 16px;border:1.5px solid var(--gray);border-radius:14px;font-size:16px;letter-spacing:.05em;transition:.16s;outline:none;background:var(--field-2)}
.code-input:focus{border-color:var(--secondary);background:var(--white);box-shadow:0 0 0 4px var(--ring)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:14px;font-weight:600;font-size:14.5px;transition:.18s;white-space:nowrap}
.btn-primary{background:linear-gradient(120deg,var(--primary) 0%,#5224C0 100%);color:#fff;width:100%;margin-top:18px;box-shadow:0 10px 24px -10px rgba(55,0,141,.55)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 14px 30px -10px rgba(55,0,141,.6)}
.btn-primary:active{transform:translateY(0)}
.login-err{color:var(--bad);font-size:13px;margin-top:12px;min-height:18px;font-weight:500}
.login-hint{margin-top:26px;padding-top:20px;border-top:1px solid var(--gray);font-size:12px;color:var(--gray-mid);line-height:1.7}
.login-hint code{background:var(--bg);padding:1px 7px;border-radius:6px;color:var(--primary);font-weight:600}

/* ===== APP SHELL ===== */
#app{min-height:100vh}
.topbar{position:sticky;top:0;z-index:30;color:#fff;
  background:linear-gradient(115deg,var(--ink) 0%,var(--ink-2) 56%,#3A1490 100%);
  border-bottom:1px solid rgba(125,93,231,.38);
  display:flex;align-items:center;gap:16px;padding:12px 22px;box-shadow:0 10px 30px -16px rgba(24,10,56,.55)}
.topbar .brand-mark{width:34px;height:34px;font-size:17px;border-radius:10px}
.topbar img{filter:drop-shadow(0 2px 6px rgba(0,0,0,.25))}
.topbar-title{font-family:'Red Hat Display';font-weight:800;font-size:17px;color:#fff;letter-spacing:-.01em}
.topbar-scope{font-size:12.5px;color:rgba(231,227,238,.62);font-weight:500}
.spacer{flex:1}
.week-nav{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:5px;backdrop-filter:blur(6px)}
.week-nav button{width:30px;height:30px;border-radius:9px;font-size:17px;color:#fff;font-weight:700;display:grid;place-items:center;transition:.14s}
.week-nav button:hover{background:rgba(255,255,255,.18)}
.week-nav select{border:none;background:transparent;font-weight:600;color:#fff;padding:4px 6px;cursor:pointer;outline:none}
.week-nav select option{color:#1D1D29;background:var(--white)fff}
.btn-ghost{padding:8px 14px;border-radius:11px;font-weight:600;font-size:13px;color:var(--primary);background:var(--bg);transition:.14s}
.btn-ghost:hover{background:var(--gray)}
.topbar .btn-ghost{color:#fff;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14)}
.topbar .btn-ghost:hover{background:rgba(255,255,255,.20)}
.tabs{display:flex;gap:6px;padding:10px 22px;background:rgba(255,255,255,.78);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--line);overflow-x:auto}
.tab{padding:9px 16px;font-weight:600;font-size:13.5px;color:var(--gray-mid);border-radius:999px;white-space:nowrap;transition:.16s;border-bottom:none}
.tab:hover{color:var(--primary);background:rgba(125,93,231,.09)}
.tab.active{color:#fff;background:linear-gradient(120deg,var(--primary),var(--secondary));box-shadow:0 8px 18px -9px rgba(55,0,141,.55);border-bottom-color:transparent}
.tab-add{color:#0f8d7c;font-weight:700;background:rgba(42,209,188,.12)}
.tab-add:hover{color:#0c7568;background:rgba(42,209,188,.22)}
.main{padding:22px 30px;max-width:none;margin:0;width:100%}

/* status pill */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.pill-saved{background:rgba(42,209,188,.16);color:#0f8d7c}
.pill-dirty{background:rgba(232,163,61,.18);color:#9a6410}
.topbar .pill-saved{background:rgba(42,209,188,.20);color:#8FF2E3;border:1px solid rgba(42,209,188,.35)}
.topbar .pill-dirty{background:rgba(232,163,61,.22);color:#FFD9A0;border:1px solid rgba(232,163,61,.4)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}

/* ===== SCHEDULE TABLE ===== */
.card{background:var(--white);border-radius:18px;border:1px solid var(--line);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px}
.card-head{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,#FDFCFE,rgba(253,252,254,0))}
.card-head h2{font-size:17px;color:var(--primary)}
.card-head .sub{font-size:12.5px;color:var(--gray-mid);font-weight:500}
.table-wrap{overflow-x:auto}
table{border-collapse:collapse;width:100%;min-width:880px}
th{background:var(--surface-2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-mid);
  padding:11px 10px;text-align:left;position:sticky;top:0;border-bottom:1px solid var(--gray)}
td{padding:7px 8px;border-bottom:1px solid var(--row-line);vertical-align:middle}
tr:hover td{background:var(--hover)}
.medic-name{font-weight:600;min-width:150px}
.day-cell input{width:110px;padding:6px 7px;border:1.5px solid transparent;border-radius:9px;text-align:center;background:var(--field);transition:.14s;font-size:12.5px}
.day-cell input:focus{border-color:var(--secondary);background:var(--white);outline:none;box-shadow:0 0 0 3px var(--ring)}
.day-cell input.liber{color:var(--gray-mid)}
.cell-input{padding:6px 8px;border:1.5px solid transparent;border-radius:9px;background:var(--field);width:100%;transition:.14s}
.cell-input:focus{border-color:var(--secondary);background:var(--white);outline:none;box-shadow:0 0 0 3px var(--ring)}
select.cell-input{cursor:pointer}
.fee-input{width:64px;text-align:center}
.suma-input{width:78px;text-align:right}
.ore-badge{font-weight:700;color:var(--primary);font-size:14px;text-align:center;font-variant-numeric:tabular-nums}
.row-del{color:var(--gray-mid);font-size:16px;width:28px;height:28px;border-radius:8px;transition:.13s}
.row-del:hover{background:rgba(224,85,110,.13);color:var(--bad)}
.add-row{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--line);align-items:center;flex-wrap:wrap}
.add-row-top{border-top:none;border-bottom:1px solid var(--line);background:var(--soft)}
.scroll-x{overflow-x:scroll}
.scroll-x::-webkit-scrollbar{height:10px}
.scroll-x::-webkit-scrollbar-track{background:var(--bg);border-radius:6px}
.scroll-x::-webkit-scrollbar-thumb{background:#C4B9E6;border-radius:6px;border:2px solid var(--bg)}
.scroll-x::-webkit-scrollbar-thumb:hover{background:var(--secondary)}
.add-row input,.add-row select{padding:9px 11px;border:1.5px solid var(--gray);border-radius:10px;outline:none;background:var(--field-2);transition:.14s}
.add-row input:focus{border-color:var(--secondary);box-shadow:0 0 0 3px var(--ring)}
.btn-add{background:var(--accent);color:#06403a;padding:9px 16px;border-radius:10px;font-weight:600;box-shadow:0 6px 14px -8px rgba(42,209,188,.7);transition:.15s}
.btn-add:hover{filter:brightness(1.06);transform:translateY(-1px)}

.inherited-note{font-size:11px;color:var(--gray-mid);font-style:italic}
.override-tag{font-size:10px;background:rgba(125,93,231,.15);color:var(--secondary);padding:1px 6px;border-radius:6px;font-weight:600;margin-left:6px}

/* ===== DASHBOARD ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(104px,1fr));gap:8px;margin-bottom:14px}
.kpi{background:var(--white);border-radius:12px;padding:9px 11px 8px;border:1px solid var(--line);box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;left:0;top:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--secondary) 55%,var(--accent));opacity:.9}
.kpi-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-mid);font-weight:600}
.kpi-val{font-family:'Red Hat Display';font-weight:900;font-size:20px;color:var(--primary);line-height:1.1;margin-top:2px;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:11px;color:var(--gray-mid);margin-top:1px}
.risk-low{color:var(--ok)!important}.risk-mid{color:var(--warn)!important}.risk-high{color:var(--bad)!important}

/* dashboard rich layout */
.dash-head{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.alert-bar{background:linear-gradient(100deg,rgba(224,85,110,.12),rgba(232,163,61,.10));border:1px solid rgba(224,85,110,.28);box-shadow:inset 3px 0 0 var(--bad);
  color:#9a3149;border-radius:13px;padding:12px 18px;font-size:13.5px;margin-bottom:18px;font-weight:500}
.dash-2col{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;align-items:start}
@media(max-width:1050px){.dash-2col{grid-template-columns:1fr}}
.sum-table{width:100%;font-size:14.5px}
.sum-table th.ctr,.sum-table td.ctr{text-align:center}
.sum-table td,.sum-table th{padding:9px 12px}
.sum-table td:first-child,.sum-table th:first-child{width:1%;white-space:nowrap;padding-right:14px}
.sum-table th:last-child,.sum-table td.evo-cell{width:auto}
.sum-table tr.row-empty td{background:#FBF6F7;color:var(--gray-mid)}
.sum-table td.b9{background:rgba(55,0,141,.14);color:var(--primary);font-weight:600;border-radius:5px}
.sum-table td.b6{background:rgba(125,93,231,.16);color:var(--secondary);font-weight:600}
.sum-table td.b3{background:rgba(42,209,188,.16);color:#0f8d7c;font-weight:600}
.sum-table td.pz-prez{color:#0f8d7c;font-weight:600}
.sum-table td.pz-local{color:var(--secondary);font-weight:600}
.sum-table td.pz-reg{color:#9a6410;font-weight:600}
.sum-table td.pz-afara{color:var(--bad);font-weight:600}
.evo-cell{padding-left:56px!important}
.sum-table th:last-child{padding-left:56px!important;text-align:left}
.evo-track{display:flex;flex-wrap:nowrap;gap:0;width:100%}
.evo-track .sq{flex:1 1 0;min-width:5px;max-width:13px;height:14px;margin:0 1px;border-radius:3px}
.evo-track .sq.sq-ovr{box-shadow:0 0 0 2px var(--black);position:relative;z-index:1}
.evo-track .sq[onclick]:hover{outline:2px solid var(--secondary);outline-offset:1px}
.sq{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:1.5px;vertical-align:middle}
.sq-low{background:var(--ok)}
.sq-mid{background:var(--warn)}
.sq-high{background:var(--bad)}
.sq-none{background:var(--gray)}
.sq-future{background:transparent;border:1px dashed var(--gray-mid);opacity:.5}
.row-unassigned td{color:var(--gray-mid)}
.row-unassigned td:first-child{font-style:italic}
/* filter & export bar */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--soft)}
.flt{padding:8px 12px;border:1.5px solid var(--gray);border-radius:11px;font-size:13px;outline:none;background:var(--white);transition:.14s}
.rec-tbl-card .filter-bar{padding:9px 14px;gap:7px}
.rec-tbl-card .filter-bar .flt{padding:6px 9px;font-size:12.5px;border-radius:9px}
.rec-tbl-card .filter-bar select.flt{max-width:131px;text-overflow:ellipsis}
.rec-tbl-card .filter-bar .flt-clear{padding:6px 11px;font-size:12px}
.flt:focus{border-color:var(--secondary);box-shadow:0 0 0 3px var(--ring)}
#fSearch{min-width:180px}
.flt-clear{padding:8px 14px;border-radius:11px;font-size:12.5px;font-weight:600;color:var(--gray-mid);background:var(--gray);transition:.13s}
.flt-clear:hover{background:#d8d2e6;color:var(--black)}
.btn-export{padding:8px 14px;border-radius:11px;font-size:12.5px;font-weight:600;color:#06403a;background:var(--accent);box-shadow:0 5px 12px -7px rgba(42,209,188,.7);transition:.14s}
.btn-export:hover{filter:brightness(1.06);transform:translateY(-1px)}
.zoom-ctl{display:flex;align-items:center;gap:4px;background:var(--white);border:1.5px solid var(--gray);border-radius:11px;padding:3px 6px;margin-right:4px}
.zoom-lbl{font-size:11px;color:var(--gray-mid);font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:0 4px}
.zoom-btn{width:26px;height:26px;border-radius:8px;font-size:15px;font-weight:700;color:var(--primary);background:var(--bg)}
.zoom-btn:hover{background:var(--gray)}
.zoom-val{font-size:12.5px;font-weight:600;min-width:38px;text-align:center;color:var(--black);font-variant-numeric:tabular-nums}
.zoom-fit{width:auto;padding:0 9px;font-size:12px}
.view-summary{padding:12px 20px;font-size:13px;color:var(--black);background:linear-gradient(100deg,rgba(125,93,231,.07),rgba(42,209,188,.05));border-bottom:1px solid var(--line)}
.view-summary b{color:var(--primary)}
.warn-flag{color:var(--warn);font-size:13px;cursor:help;margin-left:4px}
.row-warn td{background:rgba(232,163,61,.07)}
.row-warn td:first-child{box-shadow:inset 3px 0 0 var(--warn)}
.view-alerts{padding:12px 20px;border-bottom:1px solid var(--line);background:rgba(232,163,61,.08);max-height:160px;overflow-y:auto}
.alerts-head{font-weight:700;color:#9a6410;font-size:13px;margin-bottom:6px}
.alerts-detail{font-size:12px;color:#9a6410;display:block}
.alert-item{font-size:12.5px;color:#7a5210;padding:2px 0}
.alert-item b{color:#5e3f0c}
.confirm-overlay{position:fixed;inset:0;background:rgba(24,10,56,.45);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.confirm-overlay.show{display:flex}
.confirm-box{background:var(--white);border-radius:20px;border:1px solid var(--line);padding:26px 26px 20px;width:min(420px,92vw);box-shadow:var(--shadow-lg)}
.confirm-box h3{font-family:'Red Hat Display';color:var(--primary);font-size:18px;margin-bottom:10px}
.confirm-box p{font-size:14px;color:var(--black);white-space:pre-line;line-height:1.5;margin-bottom:20px}
.confirm-actions{display:flex;justify-content:flex-end;gap:10px}
.btn-danger{background:var(--bad);color:#fff;padding:10px 20px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:0 8px 18px -9px rgba(224,85,110,.7);transition:.14s}
.btn-danger:hover{filter:brightness(1.05);transform:translateY(-1px)}
.mx-edit{width:48px;text-align:center;border:1.5px solid var(--gray);border-radius:7px;padding:4px 5px;font-size:12.5px;outline:none;background:var(--white);transition:.13s}
.mx-edit.wide{width:72px;text-align:right}
.mx-edit:focus{border-color:var(--secondary);box-shadow:0 0 0 3px var(--ring)}
.pct{color:var(--gray-mid);font-size:11px;margin-left:2px}
.row-actions{white-space:nowrap;text-align:center;width:64px;min-width:64px}
.ico{width:26px;height:26px;border-radius:8px;font-size:14px;color:var(--gray-mid);background:transparent;margin:0 1px;transition:.13s}
.ico:hover{background:rgba(125,93,231,.14);color:var(--secondary)}
.ico-del:hover{background:rgba(224,85,110,.14);color:var(--bad)}
@media print{
  .topbar,.tabs,.filter-bar,.week-nav,#login{display:none!important}
  .card{box-shadow:none;border:1px solid #ccc}
  .matrix-wrap{overflow:visible!important;max-height:none!important}
  body{background:var(--white)}
}
.rpill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11.5px;font-weight:600}
.pill-ok{background:rgba(42,209,188,.18);color:#0f8d7c}
.pill-mid{background:rgba(232,163,61,.2);color:#9a6410}
.pill-bad{background:rgba(224,85,110,.18);color:#b23054}
.pill-grey{background:var(--gray);color:var(--gray-mid)}
.risk-legend{padding:14px 20px;border-top:1px solid var(--line);font-size:12px;color:var(--gray-mid)}
.rl-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.col-tot td{background:var(--bg);font-weight:700;color:var(--primary);border-top:2px solid var(--gray)}
.col-tot td:first-child{font-size:12px}
/* presence grid */
.presence-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px 28px}
/* risk evolution heatmap */
.heat-table{border-collapse:separate;border-spacing:2px;min-width:max-content}
.heat-table th.hm-h{font-size:10px;font-weight:600;color:var(--gray-mid);padding:4px 2px;text-align:center;white-space:nowrap;background:transparent;border:none;position:static;transform:rotate(-0deg)}
.heat-table th.hm-clinic,.heat-table td.hm-clinic{position:sticky;left:0;background:var(--white);text-align:left;font-weight:600;font-size:12.5px;padding:4px 8px 4px 4px;white-space:nowrap;z-index:2;border:none;width:1%}
.heat-table th.hm-clinic{z-index:3}
.hm-cell{width:26px;height:22px;text-align:center;font-size:10px;font-weight:700;border-radius:5px;color:#fff;display:table-cell;vertical-align:middle}
span.hm-cell{display:inline-block;width:15px;height:15px;border-radius:5px;vertical-align:middle}
.hm-low{background:var(--ok)}
.hm-mid{background:var(--warn)}
.hm-high{background:var(--bad)}
.hm-none{background:var(--gray)}

.sum-wrap{max-height:68vh;overflow:auto}
.sum-wrap th{z-index:5}
.matrix-wrap{overflow:auto;max-height:72vh;border-top:1px solid var(--line)}
.matrix-wrap table{min-width:1400px;border-collapse:separate;border-spacing:0}
.matrix-wrap thead th{position:sticky;top:0;z-index:4;background:var(--surface-2);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-mid);font-weight:700;padding:11px 12px;border-bottom:2px solid var(--gray);white-space:nowrap}
.matrix-wrap tbody td{padding:7px 12px;border-bottom:1px solid var(--row-line);font-size:13px}
.matrix-wrap tbody tr:hover td{background:var(--hover)}
.matrix-wrap th:first-child,.matrix-wrap td:first-child{position:sticky;left:0;z-index:2;background:var(--white)}
.matrix-wrap th:first-child{z-index:5;background:var(--surface-2)}
.matrix-wrap thead th:nth-child(2),.matrix-wrap tbody td:nth-child(2){position:sticky;left:64px;z-index:2;background:var(--white);font-weight:600}
.matrix-wrap thead th:nth-child(2){z-index:5;background:var(--surface-2)}
.matrix-wrap tbody tr:hover td:nth-child(2){background:var(--hover)}
.mx-num{text-align:center;font-variant-numeric:tabular-nums}
.mx-3{background:rgba(42,209,188,.12)}.mx-6{background:rgba(125,93,231,.14)}.mx-9{background:rgba(55,0,141,.16);color:#fff;font-weight:600}
.mx-tot{font-weight:700;color:var(--primary);text-align:center;font-variant-numeric:tabular-nums}
/* aligned editable fee / suma cells */
.mx-cell-edit{display:inline-flex;align-items:center;justify-content:flex-end;gap:3px;background:var(--field);border:1.5px solid transparent;border-radius:9px;padding:3px 8px;width:84px;transition:.14s}
.mx-cell-edit:focus-within{border-color:var(--secondary);background:var(--white);box-shadow:0 0 0 3px var(--ring)}
.mx-cell-edit input{border:none;background:transparent;outline:none;text-align:right;width:100%;font-size:13px;font-variant-numeric:tabular-nums;padding:1px 0}
.mx-cell-edit .unit{color:var(--gray-mid);font-size:11.5px;flex:none}
/* Predispoziție alocări — semafor */
.mx-pd{text-align:center}
.pd-dot{display:inline-block;width:18px;height:18px;border-radius:50%;cursor:pointer;vertical-align:middle;transition:.14s;box-sizing:border-box;box-shadow:inset 0 0 0 2px rgba(255,255,255,.5),0 2px 5px rgba(24,10,56,.18)}
.pd-dot:hover{transform:scale(1.18)}
/* Supraspecializare chip */
.mx-ss{max-width:180px}
.mx-inv{text-align:center;white-space:nowrap}.inv-yes{color:var(--ok);font-weight:700}.inv-no{color:var(--gray-mid)}
.inv-count{display:block;width:56px;margin:3px auto 0;text-align:center;font-size:11px;padding:2px 4px;border:1px solid var(--line);border-radius:6px;background:var(--field);color:var(--ink);outline:none}
.inv-count:focus{border-color:var(--secondary)}
.mx-note{text-align:center}
.med-note-btn{position:relative;background:none;border:none;cursor:pointer;font-size:15px;opacity:.45;padding:2px 4px;border-radius:6px;transition:.12s}
.med-note-btn:hover{opacity:1;background:var(--hover)}
.med-note-btn.has-notes{opacity:1}
.med-note-cnt{position:absolute;top:-3px;right:-4px;background:var(--secondary);color:#fff;font-size:9px;font-weight:700;min-width:14px;height:14px;line-height:14px;border-radius:7px;padding:0 3px}
/* rânduri mai joase în matricea Medici */
.mx-compact td{padding-top:5px;padding-bottom:5px}
.mx-compact .mx-cell-edit input{padding-top:3px;padding-bottom:3px}
.ss-chip{display:inline-block;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;padding:3px 10px;border-radius:20px;background:rgba(125,93,231,.10);color:var(--secondary);cursor:pointer;border:1px solid rgba(125,93,231,.25);transition:.13s}
.ss-chip:hover{background:rgba(125,93,231,.18)}
.ss-list{display:flex;flex-direction:column;gap:2px;max-height:300px;overflow-y:auto;margin:10px 0;border:1px solid var(--gray);border-radius:12px;padding:8px}
.ss-opt{display:flex;align-items:center;gap:8px;font-size:13.5px;padding:6px 8px;border-radius:8px;cursor:pointer}
.ss-opt:hover{background:var(--bg)}
.ss-opt input{width:16px;height:16px;accent-color:var(--secondary)}
.ss-opt-row{display:flex;align-items:center;justify-content:space-between;border-radius:8px}
.ss-opt-row:hover{background:var(--bg)}
.ss-opt-row .ss-opt{flex:1}
.ss-opt-acts{display:flex;gap:2px;padding-right:6px;opacity:.55}
.ss-opt-row:hover .ss-opt-acts{opacity:1}
.ss-add{display:flex;gap:8px}
.ss-add input{flex:1;padding:9px 11px;border:1.5px solid var(--gray);border-radius:10px;outline:none;transition:.14s}
.ss-add input:focus{border-color:var(--secondary);box-shadow:0 0 0 3px var(--ring)}
/* Compact matrix/CAS layout (no 33 clinic columns) */
.mx-compact{min-width:0!important;width:100%}
.mx-compact .mx-name{font-weight:600;white-space:nowrap;width:1px}
.mx-ben{max-width:170px}
.mx-clinics{max-width:none}
.clinic-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:2px 9px;margin:2px 3px 2px 0;border-radius:20px;background:var(--bg);border:1px solid var(--gray);white-space:nowrap}
.clinic-pill b{font-weight:700}
.clinic-pill.cp-9{background:rgba(55,0,141,.12);border-color:rgba(55,0,141,.3);color:var(--primary)}
.clinic-pill.cp-6{background:rgba(125,93,231,.12);border-color:rgba(125,93,231,.3);color:var(--secondary)}
.clinic-pill.cp-3{background:rgba(42,209,188,.14);border-color:rgba(42,209,188,.35);color:#0f8d7c}
.cp-none{color:var(--gray-mid)}
/* ===== Recrutare CRM ===== */
.rec-stats{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:14px}
.rec-stat{background:var(--white);border-radius:11px;border:1px solid var(--line);box-shadow:var(--shadow);padding:8px 10px;text-align:center}
.rec-stat-followup{background:linear-gradient(135deg,#E0556E,#C8344F);border-color:#C8344F;cursor:pointer;transition:.14s}
.rec-stat-followup:hover{filter:brightness(1.06);transform:translateY(-1px)}
.rec-stat-followup.rs-active{box-shadow:0 0 0 3px rgba(224,85,110,.35)}
.rec-stat .rs-num{font-size:20px;font-weight:800;line-height:1;font-family:'Red Hat Display';font-variant-numeric:tabular-nums}
.rec-stat .rs-lbl{font-size:10.5px;color:var(--gray-mid);margin-top:3px;font-weight:600;line-height:1.2}
.rec-summary{padding:10px 20px;font-size:13px;color:var(--gray-mid)}
.rec-tbl td{vertical-align:middle}
.rec-cat{font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(55,0,141,.08);color:var(--primary)}
.rec-link{color:var(--secondary);text-decoration:none}
.rec-link:hover{text-decoration:underline}
.rec-status{font-size:12.5px;font-weight:600;padding:5px 8px;border:1.5px solid var(--gray);border-radius:9px;background:var(--white);cursor:pointer;max-width:170px}
.rec-status.rs-green{background:rgba(42,209,188,.14);border-color:rgba(42,209,188,.4);color:#0f8d7c}
.rec-status.rs-blue{background:rgba(125,93,231,.12);border-color:rgba(125,93,231,.35);color:var(--secondary)}
.rec-status.rs-amber{background:rgba(232,163,61,.14);border-color:rgba(232,163,61,.4);color:#9a6410}
.rec-status.rs-red{background:rgba(224,85,110,.12);border-color:rgba(224,85,110,.4);color:var(--bad)}
.rec-status.rs-grey{background:var(--bg);border-color:var(--gray);color:var(--gray-mid)}
.rec-note{width:100%;min-width:200px;padding:6px 9px;border:1.5px solid var(--gray);border-radius:9px;font-size:12.5px;outline:none;font-family:inherit;transition:.13s}
.rec-note:focus{border-color:var(--secondary);box-shadow:0 0 0 3px var(--ring)}
.rec-contact{display:flex;flex-direction:column;gap:3px}
.rec-mini{width:130px;padding:4px 7px;border:1px solid var(--gray);border-radius:7px;font-size:11.5px;outline:none;font-family:inherit;transition:.13s}
.rec-mini:focus{border-color:var(--secondary);box-shadow:0 0 0 2px var(--ring)}
.rec-sort{cursor:pointer;user-select:none;white-space:nowrap}
.rec-sort:hover{color:var(--primary)}
.rec-save{margin-top:2px;padding:3px 10px;font-size:11px;font-weight:600;border:none;border-radius:7px;background:var(--secondary);color:#fff;cursor:pointer;transition:.13s}
.rec-save:hover{background:var(--primary)}
.rec-save.saved-flash{background:var(--accent);color:#06443d}
.rec-notewrap{display:flex;flex-direction:column;gap:4px}
.note-item{background:var(--bg);border-radius:8px;border-left:2px solid var(--secondary);padding:4px 7px}
.note-h{display:flex;justify-content:space-between;align-items:center;gap:4px}
.note-d{font-size:10px;color:var(--gray-mid);font-weight:600}
.note-a{display:flex;gap:1px;flex:none}
.note-t{font-size:12px;line-height:1.35;white-space:pre-wrap;word-break:break-word}
.note-empty{color:var(--gray-mid);font-size:12px}
.note-addrow{display:flex;gap:3px}
.note-input{flex:1;min-width:0;padding:5px 8px;border:1.5px solid var(--gray);border-radius:8px;font-size:12px;outline:none;font-family:inherit}
.note-input:focus{border-color:var(--secondary)}
.note-addbtn{flex:none;width:30px;padding:5px 0;font-size:15px;line-height:1}
.name-note{font-size:11px;color:var(--secondary);margin-top:4px;line-height:1.3;background:rgba(125,93,231,.07);padding:3px 7px;border-radius:7px;border-left:2px solid var(--secondary)}
/* Balanced fixed layout so the table fits without horizontal scroll */
.rec-tbl{table-layout:fixed;width:100%;min-width:0}
.rec-tbl th,.rec-tbl td{overflow:hidden;text-overflow:ellipsis}
.rec-tbl col.c-nume{width:15%}
.rec-tbl col.c-spec{width:9%}
.rec-tbl col.c-grad{width:8%}
.rec-tbl col.c-comp{width:10%}
.rec-tbl col.c-clin{width:8%}
.rec-tbl col.c-jud{width:8%}
.rec-tbl col.c-resp{width:11%}
.rec-tbl col.c-tel{width:11%}
.rec-tbl col.c-mail{width:12%}
.rec-tbl col.c-status{width:11%}
.rec-tbl .mx-name{white-space:normal;line-height:1.25}
.rec-tbl .ss-chip{max-width:100%;box-sizing:border-box}
.rec-tbl .rec-mini,.rec-tbl .rec-status{width:100%;min-width:0;box-sizing:border-box}
.rec-inline{display:flex;gap:3px;align-items:center}
.rec-inline .rec-mini{flex:1;min-width:0}
.rec-isave{flex:none;width:26px;height:28px;border:none;border-radius:7px;background:var(--secondary);color:#fff;cursor:pointer;font-size:13px;line-height:1;transition:.13s}
.rec-isave:hover{background:var(--primary)}
.rec-isave.isave-ok{background:var(--accent);color:#06443d}
.rec-name-link{font-weight:600;color:var(--primary);cursor:pointer;text-decoration:underline;text-decoration-color:rgba(55,0,141,.25);text-underline-offset:2px}
.rec-date{display:block;font-size:10.5px;color:var(--gray-mid);margin-top:1px;font-variant-numeric:tabular-nums}
.rec-motiv{display:block;margin-top:4px;width:100%;max-width:150px;font-size:11px;padding:3px 6px;border:1px solid var(--line);border-radius:7px;background:var(--field);color:var(--ink);outline:none}
.rec-motiv:focus{border-color:var(--secondary)}
.rec-name-link:hover{text-decoration-color:var(--primary)}
.note-badge{font-size:11px;color:var(--secondary);background:rgba(125,93,231,.1);border-radius:10px;padding:1px 7px;cursor:default;white-space:nowrap}
.note-badge-empty{color:var(--gray-mid);background:transparent}
.rec-del{border:none;background:transparent;color:var(--gray);cursor:pointer;font-size:13px;padding:1px 5px;border-radius:6px;margin-left:2px;line-height:1;transition:.13s}
.rec-del:hover{background:rgba(224,85,110,.12);color:var(--bad)}
/* Notes drawer */
.note-drawer{position:fixed;inset:0;z-index:1000;display:none}
.note-drawer.open{display:block}
.nd-backdrop{position:absolute;inset:0;background:rgba(24,10,56,.42);backdrop-filter:blur(3px)}
.nd-panel{position:absolute;top:0;right:0;height:100%;width:min(440px,92vw);background:var(--white);border-left:1px solid var(--line);border-radius:22px 0 0 22px;box-shadow:-18px 0 50px rgba(24,10,56,.22);display:flex;flex-direction:column;animation:ndslide .24s cubic-bezier(.3,.9,.3,1)}
@keyframes ndslide{from{transform:translateX(100%)}to{transform:translateX(0)}}
.nd-head{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 22px 14px;border-bottom:1px solid var(--line)}
.nd-title{font-size:18px;font-weight:700;color:var(--primary);font-family:'Red Hat Display'}
.nd-sub{font-size:12.5px;color:var(--gray-mid);margin-top:3px}
.nd-close{border:none;background:transparent;font-size:26px;line-height:1;color:var(--gray-mid);cursor:pointer;padding:0 4px;border-radius:8px;transition:.13s}
.nd-close:hover{color:var(--bad)}
.nd-addrow{display:flex;gap:8px;align-items:stretch;padding:16px 22px;border-bottom:1px solid var(--line)}
.nd-input{flex:1 1 0;width:0;min-width:0;min-height:46px;padding:10px 12px;border:1.5px solid var(--gray);border-radius:12px;font-family:inherit;font-size:13.5px;outline:none;resize:vertical;box-sizing:border-box;transition:.14s;background:var(--field-2)}
.nd-input:focus{border-color:var(--secondary);background:var(--white);box-shadow:0 0 0 3px var(--ring)}
.nd-add{flex:0 0 auto;width:auto;margin-top:0;padding:10px 18px;white-space:nowrap}
.nd-list{flex:1;overflow-y:auto;padding:16px 22px;display:flex;flex-direction:column;gap:10px}
.nd-empty{color:var(--gray-mid);font-size:13.5px;text-align:center;padding:30px 10px}
.nd-item{border:1px solid var(--line);border-radius:13px;padding:11px 14px;background:var(--soft)}
.nd-item-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.nd-date{font-size:11.5px;color:var(--gray-mid);font-weight:600}
.nd-acts{display:flex;gap:3px}
.nd-text{font-size:13.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
@media(max-width:1100px){.rec-stats{grid-template-columns:repeat(3,1fr)}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(24,10,56,.94);backdrop-filter:blur(8px);color:#fff;
  padding:13px 22px;border-radius:14px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow-lg);opacity:0;transition:.3s cubic-bezier(.3,.9,.3,1);z-index:99}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{background:rgba(13,122,107,.95)}.toast.err{background:rgba(207,62,90,.96)}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--gray-mid);padding:0 4px 14px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:13px;height:13px;border-radius:4px;display:inline-block}
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-mid)}
.banner{background:linear-gradient(100deg,rgba(125,93,231,.10),rgba(42,209,188,.08));border:1px solid rgba(125,93,231,.22);box-shadow:inset 3px 0 0 var(--secondary);
  border-radius:14px;padding:13px 18px;font-size:13px;margin-bottom:18px;display:flex;gap:10px;align-items:center;color:#4a2d8f}

/* ===== DARK MODE ===== */
:root.dark{color-scheme:dark;
  --primary:#A78BFA; --secondary:#8F75E8;
  --bg:#0F0A1E; --white:#181230; --black:#ECE8F6;
  --gray:#322A4E; --gray-mid:#9D94B8;
  --surface-2:#1F1840; --hover:#231C44; --field:#251E48; --field-2:#1C1538;
  --row-line:#272045; --soft:#1C1638;
  --line:rgba(167,139,250,.16); --ring:rgba(167,139,250,.25);
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 28px -14px rgba(0,0,0,.5);
  --shadow-lg:0 24px 64px -20px rgba(0,0,0,.6)}
:root.dark body{background:
  radial-gradient(1100px 560px at 88% -12%,rgba(125,93,231,.10),transparent 60%),
  radial-gradient(900px 520px at -8% 112%,rgba(42,209,188,.06),transparent 55%),
  var(--bg)}
:root.dark #login{background:
  radial-gradient(1000px 560px at 12% -6%,rgba(125,93,250,.16),transparent 60%),
  radial-gradient(880px 520px at 104% 104%,rgba(42,209,188,.10),transparent 60%),
  linear-gradient(160deg,#150E2C 0%,#120C26 55%,#0E1424 100%)}
:root.dark .login-card{background:rgba(24,18,48,.86);border-color:rgba(167,139,250,.16);outline-color:var(--line)}
:root.dark .tabs{background:rgba(15,10,30,.78)}
:root.dark .card-head{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,0))}
:root.dark .tab.active{color:#14102A}
:root.dark .btn-primary{color:#fff}
:root.dark .btn-ghost{color:#CDBFF5;background:var(--field)}
:root.dark .btn-ghost:hover{background:#322A56}
:root.dark .flt-clear:hover{background:#3A3158;color:var(--black)}
:root.dark .banner{color:#CDBFF5;border-color:rgba(167,139,250,.28)}
:root.dark .alert-bar{color:#F1A7B8;border-color:rgba(224,85,110,.4)}
:root.dark .sum-table tr.row-empty td{background:#241829}
:root.dark .sum-table td.b9{color:#CDBFF5;background:rgba(167,139,250,.18)}
:root.dark .mx-9{background:rgba(167,139,250,.30)}
:root.dark .rec-cat{background:rgba(167,139,250,.16)}
:root.dark .pill-saved,:root.dark .pill-ok,:root.dark .sum-table td.b3,:root.dark .sum-table td.pz-prez,
:root.dark .clinic-pill.cp-3,:root.dark .rec-status.rs-green,:root.dark .tab-add{color:#6FE8D2}
:root.dark .tab-add:hover{color:#9CF1E2}
:root.dark .pill-dirty,:root.dark .pill-mid,:root.dark .sum-table td.pz-reg,:root.dark .rec-status.rs-amber,
:root.dark .alerts-head,:root.dark .alerts-detail,:root.dark .alert-item,:root.dark .alert-item b{color:#F0C277}
:root.dark .pill-bad{color:#F49EB4}
:root.dark .login-hint code{color:#CDBFF5}
:root.dark *::-webkit-scrollbar-thumb{background:#463A6E;border:2px solid transparent;background-clip:content-box}
:root.dark *::-webkit-scrollbar-thumb:hover{background:#5A4C8C;border:2px solid transparent;background-clip:content-box}
:root.dark .scroll-x::-webkit-scrollbar-thumb{background:#463A6E;border:2px solid var(--bg)}
</style>
</head>
<body>

<!-- LOGIN -->

<script>
/* ============ STATE & PERSISTENCE ============
   Prototip: datele se salvează LOCAL (window.storage) per utilizator.
   În versiunea conectată, aceste funcții (loadWeek/saveWeek) vor apela
   Google Sheets prin Apps Script web-app, păstrând aceeași interfață. */
</script>
<script>
/* ===================== CONFIG ===================== */
// CLINICS and CODES are mutable and persisted so new clinics can be added in production.
let CLINICS = DEMO.clinics.slice();
let CODES = Object.assign({}, DEMO.codes);   // clinic -> access code
const CENTRAL_CODE = 'medima-central';
const DAYS = ['Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă','Duminică'];
const PREZENTA_OPTS = ['', 'Prezent în clinică','Medic local','Medic regional','Din afara regiunii'];
const STORE_PREFIX = 'medima_prog_v1:';   // storage key namespace

/* Storage abstraction: uses window.storage in the Claude artifact environment,
   falls back to localStorage when the file is opened directly in a browser,
   and to an in-memory map as a last resort. Same async interface either way. */
const memStore={};
const STORE = (function(){
  // Prototype: prefer instant localStorage. window.storage (artifact bridge)
  // can be slow, so it is only a fallback when localStorage is unavailable.
  const hasLS=(()=>{try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return true;}catch(e){return false;}})();
  if(hasLS){
    return {
      async get(k){ const v=localStorage.getItem(k); return v==null?null:{key:k,value:v}; },
      async set(k,v){ localStorage.setItem(k,v); return {key:k,value:v}; }
    };
  }
  if(typeof window!=='undefined' && window.storage && typeof window.storage.get==='function'){
    const withTimeout=(p)=>Promise.race([p,new Promise((_,rej)=>setTimeout(()=>rej(new Error('storage timeout')),4000))]);
    return {
      async get(k){ try{ return await withTimeout(window.storage.get(k)); }catch(e){ return null; } },
      async set(k,v){ try{ return await withTimeout(window.storage.set(k,v)); }catch(e){ return null; } }
    };
  }
  return {
    async get(k){ return k in memStore?{key:k,value:memStore[k]}:null; },
    async set(k,v){ memStore[k]=v; return {key:k,value:v}; }
  };
})();

/* ===================== BACKEND (Google Sheets web app) =====================
   When BACKEND.url is set, the tool reads/writes the shared Google Sheet through
   the Apps Script web app. The access code (entered at login) authorizes each call.
   If the backend is unreachable, the tool stays usable in local mode. */
const BACKEND = {
  // Adresa backend-ului. Doua variante:
  //  1) Backend Node pe serverul Medima, interfata servita de acelasi server:  url: '/exec'
  //     (sau URL complet daca e pe alt domeniu, ex. 'https://program.medima.ro/exec')
  //  2) Backend Google Apps Script (varianta veche):  URL-ul de deployment '.../exec'
  url: '/exec',
  code: null,          // set at login (raw access code)
  enabled: true
};
async function api(action, payload){
  if(!BACKEND.enabled || !BACKEND.url) throw new Error('backend off');
  const body = Object.assign({action, code: BACKEND.code}, payload||{});
  const res = await fetch(BACKEND.url, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // text/plain avoids CORS preflight
    body: JSON.stringify(body),
    redirect:'follow'
  });
  const txt = await res.text();
  let data; try{ data=JSON.parse(txt); }catch(e){ throw new Error('răspuns invalid de la server'); }
  if(data && data.ok===false) throw new Error(data.error||'eroare server');
  return data;
}

/* ===================== WEEKS ===================== */
// Monitoring starts Mon 01.06.2026. Pre-generate all Mondays to end of 2026.
const MONITOR_START='2026-06-01';
function genWeeks(){
  const w=[]; let d=new Date(MONITOR_START+'T00:00:00Z');
  while(d.getUTCFullYear()===2026){ w.push(iso(d)); d.setUTCDate(d.getUTCDate()+7); }
  return w;
}
function iso(d){return d.toISOString().slice(0,10);}
function fmtWeek(s){const d=new Date(s+'T00:00:00Z');const e=new Date(d);e.setUTCDate(e.getUTCDate()+6);
  const f=x=>String(x.getUTCDate()).padStart(2,'0')+'.'+String(x.getUTCMonth()+1).padStart(2,'0');
  return f(d)+'–'+f(e)+'.'+d.getUTCFullYear();}
const WEEKS = genWeeks();

/* ===================== SESSION ===================== */
let SESSION = null;   // {role:'clinic'|'central', clinic:str|null}
let curWeek = defaultWeek();
let activeTab = null; // clinic name OR 'dashboard'|'cas'|'matrix'
let dirty = false;

function defaultWeek(){
  const today=new Date(); const t=iso(today);
  let best=WEEKS[0];
  for(const w of WEEKS){ if(w<=t) best=w; else break; }
  return best;
}

/* ===================== DATA MODEL =====================
   In-memory cache: weekData[week][clinic] = [ {medic,prezenta,fee,suma,invest,zile:[7], _override:bool} ]
   Propagation: a week with no stored data inherits a deep copy from the most recent
   PRIOR week that has data for that clinic. Editing + saving creates an explicit
   record for that week; that record then becomes the base for later weeks. */
const cache = {}; // week -> clinic -> rows (working copy, includes inherited)
let SERVER_DATA = null; // snapshot from one bulk loadAll: week -> clinic -> rows (saved only)
let RISC_OVERRIDE = {}; // "week::clinic" -> "Scăzut"|"Mediu"|"Ridicat" (admin manual override)

function riscKey(week,clinic){return week+'::'+clinic;}
async function loadRiscOverride(){
  if(!(BACKEND.enabled && BACKEND.url)) return;
  try{ const r=await api('loadRisc',{}); RISC_OVERRIDE=r.risc||{}; }catch(e){ RISC_OVERRIDE={}; }
}
// Cycle order for click-through: automat -> Scăzut -> Mediu -> Ridicat -> automat
const RISC_CYCLE=['Scăzut','Mediu','Ridicat'];
async function cycleRisc(week,clinic){
  if(!SESSION || SESSION.role!=='central') return;
  const k=riscKey(week,clinic);
  const cur=RISC_OVERRIDE[k];
  let next;
  if(!cur) next='Scăzut';
  else{ const i=RISC_CYCLE.indexOf(cur); next = i>=RISC_CYCLE.length-1 ? '' : RISC_CYCLE[i+1]; }
  // optimistic UI
  if(next) RISC_OVERRIDE[k]=next; else delete RISC_OVERRIDE[k];
  if(activeTab==='dashboard') renderDashboard();
  // In modul local (fara backend) suprascrierea ramane in memoria sesiunii;
  // nu incercam apel de server, ca sa nu aruncam o eroare falsa.
  if(!(BACKEND.enabled && BACKEND.url)) return;
  try{ await api('setRisc',{week,clinic,risc:next||'auto'}); setStatus(true); }
  catch(e){ toast('Salvare risc eșuată: '+e.message,'err'); await loadRiscOverride(); if(activeTab==='dashboard') renderDashboard(); }
}

function storeKey(week,clinic){return STORE_PREFIX+week+'::'+clinic;}

// Risk to display: manual override (admin) takes precedence over the computed value.
function effectiveRisc(week,clinic,computed){
  const o=RISC_OVERRIDE[riscKey(week,clinic)];
  return o || computed;
}

// Load the entire dataset in ONE server call (or from local store), cached in memory.
async function primeData(){
  if(SERVER_DATA) return SERVER_DATA;
  SERVER_DATA={};
  if(BACKEND.enabled && BACKEND.url){
    try{ const r=await api('loadAll',{}); SERVER_DATA=r.data||{}; }catch(e){ SERVER_DATA={}; }
  }
  return SERVER_DATA;
}
function serverRows(week,clinic){
  return (SERVER_DATA && SERVER_DATA[week] && SERVER_DATA[week][clinic]) ? SERVER_DATA[week][clinic] : null;
}

async function loadWeekClinic(week,clinic){
  if(cache[week]&&cache[week][clinic]) return cache[week][clinic];
  let rows=null;
  if(BACKEND.enabled && BACKEND.url){
    await primeData();
    const sr=serverRows(week,clinic); rows=(sr&&sr.length)?sr.map(x=>({...x,zile:[...x.zile]})):null;
  } else {
    try{ const r=await STORE.get(storeKey(week,clinic)); if(r&&r.value) rows=JSON.parse(r.value);}catch(e){}
  }
  if(!rows){
    // inherit from most recent prior week that has data
    rows = await inheritRows(week,clinic);
  }
  cache[week]=cache[week]||{}; cache[week][clinic]=rows;
  return rows;
}

async function inheritRows(week,clinic){
  const idx=WEEKS.indexOf(week);
  for(let i=idx-1;i>=0;i--){
    const w=WEEKS[i];
    if(BACKEND.enabled && BACKEND.url){
      await primeData();
      const sr=serverRows(w,clinic);
      if(sr&&sr.length){ return sr.map(x=>({...x,zile:[...x.zile],_inherited:true})); }
    } else {
      try{ const r=await STORE.get(storeKey(w,clinic));
        if(r&&r.value){ const base=JSON.parse(r.value);
          return base.map(x=>({...x,zile:[...x.zile],_inherited:true})); }
      }catch(e){}
    }
  }
  // fallback: seed from DEMO baseline (only used before any real data exists)
  const seed=(DEMO.demo[clinic]||[]).map(x=>({
    medic:x.medic,prezenta:x.prezenta||'',fee:x.fee||0,suma:x.suma||0,
    invest:x.invest||'Nu',zile:[...x.zile],_inherited:true}));
  return seed;
}

async function saveWeekClinic(week,clinic,rows){
  cache[week]=cache[week]||{}; cache[week][clinic]=rows;
  const clean=rows.map(({_inherited,_override,...r})=>r);
  if(BACKEND.enabled && BACKEND.url){
    try{
      await api('saveClinic',{week,clinic,rows:clean});
      // keep the in-memory snapshot in sync so we don't need to refetch everything
      if(SERVER_DATA){ SERVER_DATA[week]=SERVER_DATA[week]||{}; SERVER_DATA[week][clinic]=clean.map(x=>({...x,zile:[...x.zile]})); }
      return true;
    }catch(e){ toast('Salvarea pe server a eșuat: '+e.message,'err'); return false; }
  }
  try{ await STORE.set(storeKey(week,clinic),JSON.stringify(clean));
    return true; }catch(e){ return false; }
}

/* ===================== CALC HELPERS ===================== */
// parse "8-17" or "8-17, 18-20" -> total hours
function hoursFromCell(v){
  if(!v||/liber/i.test(v)) return 0;
  let tot=0;
  v.split(',').forEach(seg=>{
    const m=seg.trim().match(/(\d{1,2})\s*-\s*(\d{1,2})/);
    if(m){let a=+m[1],b=+m[2]; if(b<a)b+=12; tot+=Math.max(0,b-a);}
  });
  return tot;
}
function weekHours(row){ return row.zile.reduce((s,d)=>s+hoursFromCell(d),0); }
// Parse a day cell "8-17, 18-20" into intervals [[8,17],[18,20]]
function intervalsFromCell(v){
  if(!v||/liber/i.test(v)) return [];
  const out=[];
  v.split(',').forEach(seg=>{
    const m=seg.trim().match(/(\d{1,2})\s*-\s*(\d{1,2})/);
    if(m){let a=+m[1],b=+m[2]; if(b<a)b+=12; if(b>a) out.push([a,b]);}
  });
  return out;
}
// Union length of a set of intervals (covered hours, overlaps counted once)
function unionHours(intervals){
  if(!intervals.length) return 0;
  const s=intervals.slice().sort((x,y)=>x[0]-y[0]);
  let total=0, curS=s[0][0], curE=s[0][1];
  for(let i=1;i<s.length;i++){
    if(s[i][0]<=curE){ curE=Math.max(curE,s[i][1]); }
    else { total+=curE-curS; curS=s[i][0]; curE=s[i][1]; }
  }
  total+=curE-curS;
  return total;
}
// CAS hour-band per day: max daily hours mapped to 3/6/9
function casBand(row){
  const maxDay=Math.max(0,...row.zile.map(hoursFromCell));
  if(maxDay>=9) return 9; if(maxDay>=6) return 6; if(maxDay>=3) return 3; return 0;
}
// Per-clinic operational summary for a set of medic rows
function clinicStats(rows){
  rows=rows||[];
  const medici=rows.length;
  let b9=0,b6=0,b3=0, prezent=0,local=0,regional=0,afara=0;
  rows.forEach(r=>{
    const b=casBand(r); if(b===9)b9++; else if(b===6)b6++; else if(b===3)b3++;
    if(/prezent/i.test(r.prezenta))prezent++;
    else if(/local/i.test(r.prezenta))local++;
    else if(/regional/i.test(r.prezenta))regional++;
    else if(/afara/i.test(r.prezenta))afara++;
  });
  // Coverage Mon-Fri: for each weekday, union of all medics' intervals (overlaps counted once),
  // then average across the 5 weekdays.
  let coverWeek=0;
  for(let d=0;d<7;d++){
    let dayIntervals=[];
    rows.forEach(r=>{ dayIntervals=dayIntervals.concat(intervalsFromCell(r.zile[d])); });
    coverWeek+=unionHours(dayIntervals);
  }
  // Acoperire/zi: suma orelor distinct acoperite pe TOATE cele 7 zile (Lu-Du),
  // impartita conventional la 5 zile lucratoare.
  const acoperire = medici? (coverWeek/5) : 0;
  let risc, status;
  if(medici===0){ risc='Necompletat'; status='necompletat'; }
  else{
    status='ok';
    if(regional+afara===0) risc='Scăzut';
    else if(prezent+local===0) risc='Ridicat';
    else risc='Mediu';
  }
  return {medici,b9,b6,b3,prezent,local,regional,afara,acoperire,risc,status};
}

/* ===================== LOGIN / SESSION ===================== */
async function doLogin(){
  const raw=document.getElementById('codeInput').value.trim();
  const err=document.getElementById('loginErr');
  err.textContent='Se verifică...';
  if(BACKEND.enabled && BACKEND.url){
    // Validate on the server (real access control)
    BACKEND.code=raw;
    try{
      const r=await api('auth',{});
      SESSION={role:r.role, clinic:r.clinic||null, region:r.region||null, clinics:r.clinics||null};
      // fire the independent loads in parallel (config, all program data, roster)
      await Promise.all([ loadClinicsConfig(), primeData(), loadRoster(), loadRiscOverride() ]);
    }catch(e){
      BACKEND.code=null;
      err.textContent='Cod invalid sau server indisponibil. Verifică și încearcă din nou.';
      return;
    }
  } else {
    // Local fallback (demo mode)
    const code=raw.toLowerCase();
    await loadClinicsConfig();
    if(code===CENTRAL_CODE){ SESSION={role:'central',clinic:null}; }
    else{
      const hit=Object.entries(CODES).find(([cl,c])=>String(c).toLowerCase()===code);
      if(!hit){ err.textContent='Cod invalid. Verifică și încearcă din nou.'; return; }
      SESSION={role:'clinic',clinic:hit[0]};
    }
    // Asigura ROSTER incarcat si in mod local, ca editarea fee-ului sa aiba unde scrie
    await loadRoster();
  }
  err.textContent='';
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  initApp();
}

// load ALL clinics for current week. Fast path reads from the snapshot with inheritance.
async function loadAllClinics(){
  await primeData();
  const data={};
  if(BACKEND.enabled && BACKEND.url){
    const idx=WEEKS.indexOf(curWeek);
    for(const c of CLINICS){
      // find this week's data, else most recent prior week, else demo seed
      let rows=(SERVER_DATA[curWeek]&&SERVER_DATA[curWeek][c])?SERVER_DATA[curWeek][c]:null;
      if(!rows){ for(let i=idx-1;i>=0;i--){ const w=WEEKS[i];
        if(SERVER_DATA[w]&&SERVER_DATA[w][c]){ rows=SERVER_DATA[w][c]; break; } } }
      if(!rows) rows=DEMO.demo[c]||[];
      data[c]=rows;
    }
    return data;
  }
  if(cache[curWeek]) delete cache[curWeek];
  for(const c of CLINICS){ data[c]=await loadWeekClinic(curWeek,c); }
  return data;
}

// Risk evolution: for every week from the first up to current, compute each clinic's risk level.
// Fast path: read directly from the in-memory snapshot, carrying forward the last known
// schedule per clinic (inheritance) without thousands of async calls or deep copies.
async function riskHistory(){
  await primeData();
  const idx=WEEKS.indexOf(curWeek);
  const weeks=WEEKS.slice(0,idx+1);
  const hist={}; CLINICS.forEach(c=>hist[c]={});
  if(BACKEND.enabled && BACKEND.url){
    // carry-forward over the snapshot (no per-cell fetch)
    const last={}; // clinic -> last seen rows
    for(const w of weeks){
      for(const c of CLINICS){
        const sr=(SERVER_DATA[w]&&SERVER_DATA[w][c])?SERVER_DATA[w][c]:null;
        if(sr) last[c]=sr;                       // explicit data for this week
        const rows=sr || last[c] || (DEMO.demo[c]||[]); // else inherit last, else demo seed
        hist[c][w]=effectiveRisc(w,c,clinicStats(rows).risc);
      }
    }
    return {weeks,hist};
  }
  // local mode fallback (original behavior)
  for(const w of weeks){
    for(const c of CLINICS){
      const rows=await loadWeekClinic(w,c);
      hist[c][w]=effectiveRisc(w,c,clinicStats(rows).risc);
    }
  }
  return {weeks,hist};
}

// shared state for filterable views
let VIEW_MED={}, VIEW_NAMES=[], VIEW_MODE='cas';
function getFilters(){
  return {
    q:(document.getElementById('fSearch')||{}).value?.trim().toLowerCase()||'',
    clinic:(document.getElementById('fClinic')||{}).value||'',
    band:(document.getElementById('fBand')||{}).value||'',
    flag:(document.getElementById('fFlag')||{}).value||''
  };
}
function passesFilter(n){
  const m=VIEW_MED[n]; const f=getFilters();
  if(f.q && !n.toLowerCase().includes(f.q)) return false;
  if(f.clinic && !(m.per[f.clinic]>0)) return false;
  if(f.band){ const b=+f.band; if(!Object.values(m.per).some(v=>v===b)) return false; }
  if(f.flag==='cas' && !clinicsInView().some(c=>m.per[c]>0)) return false;
  if(f.flag==='unassigned' && m.nClinici>0) return false;
  if(f.flag==='notes' && !medNotesCount(m.notite)) return false;
  if(f.flag==='warn' && !(m.warn&&m.warn.length)) return false;
  return true;
}
function applyFilters(){
  let visible=VIEW_NAMES.filter(passesFilter);
  const f=getFilters();
  if(f.flag==='notes'){
    // În modul "cu notițe": cei mai adnotați primii, apoi alfabetic
    visible=visible.slice().sort((a,b)=>{
      const d=medNotesCount(VIEW_MED[b].notite)-medNotesCount(VIEW_MED[a].notite);
      return d!==0?d:a.localeCompare(b,'ro');
    });
  }
  // rebuild body
  const tbl=document.getElementById(VIEW_MODE==='cas'?'casTbl':'mxTbl');
  if(tbl){
    const tb=tbl.querySelector('tbody');
    tb.innerHTML=visible.map(n=>medRow(n)).join('')+colTotRow(visible);
  }
  // live summary
  const sumEl=document.getElementById('viewSummary');
  if(sumEl){
    const totSuma=visible.reduce((s,n)=>s+(VIEW_MED[n].suma||0),0);
    const nMulti=visible.filter(n=>VIEW_MED[n].nClinici>1).length;
    const nAsig=visible.filter(n=>VIEW_MED[n].nClinici>0).length;
    sumEl.innerHTML=`<b>${visible.length}</b> medici afișați &nbsp;·&nbsp; <b>${nAsig}</b> cu program &nbsp;·&nbsp; <b>${nMulti}</b> în 2+ clinici &nbsp;·&nbsp; sumă fixă: <b>${totSuma.toLocaleString('ro-RO')}</b> RON/lună`;
  }
  // alerts band: only possible-duplicate warnings remain
  const alEl=document.getElementById('viewAlerts');
  if(alEl){
    const flagged=VIEW_NAMES.filter(n=>VIEW_MED[n].warn&&VIEW_MED[n].warn.length);
    if(flagged.length){
      alEl.style.display='';
      alEl.innerHTML=`<span class="alerts-head">⚠ ${flagged.length} posibile dubluri de nume</span>
        <span class="alerts-detail">Nume foarte asemănătoare care ar putea fi aceeași persoană scrisă diferit. Click pe ⚠ de pe rând pentru detalii; dacă e aceeași persoană, redenumește una dintre variante (în clinică sau în listă) ca numele să fie identice.</span>`;
    } else { alEl.style.display='none'; alEl.innerHTML=''; }
  }
  applyZoom();
}

  const clinicsCell=`<td class="mx-clinics">${pills||'<span class="cp-none">—</span>'}</td>`;
  return `<tr class="${m.warn&&m.warn.length?'row-warn':''} ${m.nClinici?'':'row-unassigned'}">
    <td class="row-actions"><button class="ico" title="Redenumește" onclick="renameRoster('${nameEsc}')">✎</button><button class="ico ico-del" title="Șterge din listă" onclick="delRoster('${nameEsc}')">×</button></td>
    <td class="mx-name">${esc(n)}${warn}</td>
    <td class="mx-num"><span class="mx-cell-edit"><input value="${((m.feeRMN||0)*100).toFixed(0)}" onchange="updRoster('${nameEsc}','feeRMN',(parseFloat(this.value)||0)/100)"><span class="unit">%</span></span></td>
    <td class="mx-num"><span class="mx-cell-edit"><input value="${((m.feeCT||0)*100).toFixed(0)}" onchange="updRoster('${nameEsc}','feeCT',(parseFloat(this.value)||0)/100)"><span class="unit">%</span></span></td>

let ZOOM=1;
const ZOOM_STEPS=[0.4,0.5,0.6,0.7,0.8,0.9,1];
function applyZoom(){
  const tbl=document.getElementById(VIEW_MODE==='cas'?'casTbl':'mxTbl');
  if(!tbl)return;
  tbl.style.transformOrigin='top left';
  tbl.style.transform='scale('+ZOOM+')';
  tbl.style.width=(100/ZOOM)+'%';
  const zv=document.getElementById('zoomVal'); if(zv)zv.textContent=Math.round(ZOOM*100)+'%';
}
function setZoom(dir){
  let i=ZOOM_STEPS.indexOf(ZOOM); if(i<0)i=ZOOM_STEPS.length-1;
  i=Math.max(0,Math.min(ZOOM_STEPS.length-1,i+dir));
  ZOOM=ZOOM_STEPS[i]; applyZoom();
}
function zoomFit(){
  const wrap=document.querySelector('.matrix-wrap'); const tbl=document.getElementById(VIEW_MODE==='cas'?'casTbl':'mxTbl');
  if(!wrap||!tbl)return;
  tbl.style.transform='scale(1)'; tbl.style.width='';
  const natural=tbl.scrollWidth, avail=wrap.clientWidth;
  ZOOM=Math.max(0.3,Math.min(1, avail/natural));
  applyZoom();
}

/* ===== Predispoziție alocări — semafor (pct 4, admin only) ===== */
const PD_CYCLE=['verde','galben','rosu'];
async function cyclePredispozitie(name){
  if(!SESSION || SESSION.role!=='central'){ toast('Doar adminul poate edita','err'); return; }
  let i=rosterIdx(name); if(i<0){ ROSTER.push({medic:name,fee:0,suma:0}); i=ROSTER.length-1; }
  const cur=ROSTER[i].predispozitie||'';
  let next; if(!cur) next='verde'; else { const k=PD_CYCLE.indexOf(cur); next = k>=PD_CYCLE.length-1 ? '' : PD_CYCLE[k+1]; }
  ROSTER[i].predispozitie=next;
  if(VIEW_MED[name]) VIEW_MED[name].predispozitie=next;
  await saveRoster(); applyFilters(); setStatus(true);
}

let _ssMedic=null;
// Editor generic de etichete multi-select pentru un camp din foaia Medici
// (deocamdată doar supraspec), cu nomenclator propriu si propagare la redenumire.
const MED_TAGFIELDS={ supraspec:{nom:'supraspec', title:'Supraspecializări', ph:'Adaugă supraspecializare nouă (ex: Coronare)'},
                      beneficii:{nom:'beneficiu', title:'Beneficii extra', ph:'Adaugă un beneficiu nou'} };
let _ssField='supraspec';
async function openSupraspec(name){ return openTagEditor(name,'supraspec'); }
async function openBeneficii(name){ return openTagEditor(name,'beneficii'); }
async function openTagEditor(name, field){
  if(!SESSION || SESSION.role!=='central'){ toast('Doar adminul poate edita','err'); return; }
  _ssMedic=name; _ssField=field;
  const cfg=MED_TAGFIELDS[field]; const nomKey=cfg.nom;
  await loadNomen();
  const i=rosterIdx(name);
  const current=((i>=0?ROSTER[i][field]:'')||'').split(',').map(s=>s.trim()).filter(Boolean);
  const ov=document.getElementById('ssOverlay');
  document.getElementById('ssTitle').textContent=cfg.title+' — '+name;
  const list=document.getElementById('ssList');
  const opts=NOMEN[nomKey]||[];
  list.innerHTML = opts.length ? opts.map((o,idx)=>`<div class="ss-opt-row">
      <label class="ss-opt"><input type="checkbox" value="${esc(o)}" ${current.includes(o)?'checked':''}> <span>${esc(o)}</span></label>
      <span class="ss-opt-acts"><button class="ico" title="Redenumește (se modifică la toți medicii)" onclick="ssEditOption(${idx})">✎</button><button class="ico ico-del" title="Șterge din listă (se scoate de la toți)" onclick="ssDelOption(${idx})">×</button></span>
    </div>`).join('')
    : `<div style="color:var(--gray-mid);font-size:13px;padding:8px">Nicio valoare definită încă. Adaugă mai jos.</div>`;
  const np=document.getElementById('ssNew'); if(np) np.placeholder=cfg.ph;
  ov.classList.add('show');
  ov.dataset.mode='medtag';
}
async function ssEditOption(idx){
  const fld=_ssField||'supraspec'; const nomKey=MED_TAGFIELDS[fld].nom;
  const old=NOMEN[nomKey][idx]; if(old==null) return;
  const nv=prompt('Redenumește (se modifică automat la toți medicii care o au):',old);
  if(nv===null) return;
  const val=nv.trim(); if(!val){ return; }
  if(val===old){ return; }
  if(NOMEN[nomKey].some((s,j)=>j!==idx && normName(s)===normName(val))){ toast('Există deja o valoare cu acest nume','err'); return; }
  NOMEN[nomKey][idx]=val;
  let changed=0;
  ROSTER.forEach(r=>{
    if(!r[fld]) return;
    const arr=r[fld].split(',').map(s=>s.trim()).filter(Boolean);
    let hit=false;
    const out=arr.map(s=>{ if(normName(s)===normName(old)){ hit=true; return val; } return s; });
    if(hit){ r[fld]=out.join(', '); changed++; }
  });
  await saveNomen();
  if(changed){ await saveRoster(); }
  if(VIEW_MED){ Object.values(VIEW_MED).forEach(m=>{ if(m[fld]){ m[fld]=m[fld].split(',').map(s=>s.trim()).map(s=>normName(s)===normName(old)?val:s).join(', '); } }); }
  toast('Redenumit'+(changed?` (actualizat la ${changed} medici)`:''),'ok');
  openTagEditor(_ssMedic,fld);
  if(VIEW_MODE) applyFilters();
}
// Remove a supraspecializare from the list and from all medics
async function ssDelOption(idx){
  const fld=_ssField||'supraspec'; const nomKey=MED_TAGFIELDS[fld].nom;
  const old=NOMEN[nomKey][idx]; if(old==null) return;
  const ok=await confirmDialog('Ștergere valoare','Sigur scoți „'+old+'” din listă? Se va elimina și de la toți medicii care o au.','Șterge','Anulează');
  if(!ok) return;
  NOMEN[nomKey].splice(idx,1);
  let changed=0;
  ROSTER.forEach(r=>{
    if(!r[fld]) return;
    const arr=r[fld].split(',').map(s=>s.trim()).filter(Boolean);
    const out=arr.filter(s=>normName(s)!==normName(old));
    if(out.length!==arr.length){ r[fld]=out.join(', '); changed++; }
  });
  await saveNomen();
  if(changed){ await saveRoster(); }
  if(VIEW_MED){ Object.values(VIEW_MED).forEach(m=>{ if(m[fld]){ m[fld]=m[fld].split(',').map(s=>s.trim()).filter(s=>normName(s)!==normName(old)).join(', '); } }); }
  toast('Șters'+(changed?` (eliminat de la ${changed} medici)`:''),'ok');
  openTagEditor(_ssMedic,fld);
  if(VIEW_MODE) applyFilters();
}
function ssClose(){ document.getElementById('ssOverlay').classList.remove('show'); document.getElementById('ssOverlay').dataset.mode=''; _ssMedic=null; _multiId=null; }

    inp.value=''; openMulti(_multiId,_multiField);
  } else {
    const fld=_ssField||'supraspec'; const nomKey=MED_TAGFIELDS[fld].nom;

async function ssSave(){
  const mode=document.getElementById('ssOverlay').dataset.mode;

  if(mode==='multi'){

function exportView(fmt){
  // Exportul oglindeste EXACT coloanele afisate in tabel, in aceeasi ordine,
  // doar randurile vizibile dupa filtre. Clinicile afisate sunt cele din vederea curenta.
  const visible=VIEW_NAMES.filter(passesFilter);
  const pdRO={'verde':'Da','galben':'Cu prudență','rosu':'Nu','':''};
  const cls=clinicsInView();
  // Inv. în fee: ca in tabel, "Da (n)" / "Nu" / "—"
  const invCell=m=>{ const v=m.invest||''; if(v==='Da') return 'Da'+(m.investVal?' ('+m.investVal+')':''); if(v==='Nu') return 'Nu'; return ''; };
  // Notițe: text concatenat din istoricul JSON
  const notesCell=m=>parseMedNotes(m.notite).map(x=>(x.d?'['+x.d+'] ':'')+x.t).join(' | ');
  const head=['Medic','Fee RMN','Fee CT','Sumă fixă','Max. segm./zi','Aloc.','Supraspecializare','Beneficii extra','Inv. în fee','Notițe',...cls.map(c=>c+' (ore CAS/zi)')];
  const rows=visible.map(n=>{const m=VIEW_MED[n];
    return [n,((m.feeRMN||0)*100).toFixed(0)+'%',((m.feeCT||0)*100).toFixed(0)+'%',m.suma||0,m.maxSegm||0,pdRO[m.predispozitie||'']||'',m.supraspec||'',m.beneficii||'',invCell(m),notesCell(m),...cls.map(c=>m.per[c]?m.per[c]+'h':'')];});
  const title=(VIEW_MODE==='cas'?'Medici_CAS':'Medici')+'_'+curWeek;
  if(fmt==='csv'){
    const csv=[head,...rows].map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
    dl(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),title+'.csv');
  }else if(fmt==='pdf'){
    exportPDF(head,rows,'Medici · '+fmtWeek(curWeek)+(VIEW_REGION?' · '+VIEW_REGION:''));
  }else{
    const ws=XLSX.utils.aoa_to_sheet([head,...rows]);
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Medici');
    XLSX.writeFile(wb,title+'.xlsx');
  }
  toast('Export '+fmt.toUpperCase()+' generat','ok');
}
// PDF prin fereastra de print dedicata: continut identic cu exportul, doar randurile filtrate
function exportPDF(head,rows,titlu){
  const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>${esc(titlu)}</title>
    <style>
      body{font-family:'Red Hat Text',Arial,sans-serif;color:#1D1D29;margin:24px}
      h1{font-size:16px;color:#37008D;margin:0 0 4px}
      .sub{font-size:11px;color:#777;margin-bottom:14px}
      table{border-collapse:collapse;width:100%;font-size:10px}
      th,td{border:1px solid #ccc;padding:4px 6px;text-align:left;vertical-align:top}
      th{background:#37008D;color:#fff;font-weight:600}
      tr:nth-child(even) td{background:#f6f4fb}
      @media print{@page{size:landscape;margin:10mm}}
    </style></head><body>
    <h1>${esc(titlu)}</h1><div class="sub">${rows.length} înregistrări · generat ${new Date().toLocaleString('ro-RO')}</div>
    <table><thead><tr>${head.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>
    <script>window.onload=function(){setTimeout(function(){window.print();},250);};<\/script>
    </body></html>`;
  const w=window.open('','_blank');
  if(!w){ toast('Permite ferestrele pop-up pentru export PDF','err'); return; }
  w.document.write(html); w.document.close();
}
function dl(blob,name){
  try{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=name; a.rel='noopener'; a.style.display='none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },1500);
  }catch(e){
    // Fallback: open as data URI in a new tab if blob download is blocked
    try{ const fr=new FileReader(); fr.onload=()=>window.open(fr.result,'_blank'); fr.readAsDataURL(blob); }catch(_){ toast('Descărcarea nu a putut fi pornită','err'); }
  }
}

const CLINICS_KEY=STORE_PREFIX+'clinics_config';
async function loadClinicsConfig(){
  if(BACKEND.enabled && BACKEND.url){
    try{ const r=await api('loadConfig',{});
      if(r.clinics && r.clinics.clinics && r.clinics.clinics.length){
        CLINICS=r.clinics.clinics; CODES=r.clinics.codes||CODES; } return; }catch(e){ return; }
  }
  try{ const r=await STORE.get(CLINICS_KEY); if(r&&r.value){ const cfg=JSON.parse(r.value);
    if(cfg.clinics&&cfg.clinics.length){ CLINICS=cfg.clinics; CODES=cfg.codes||CODES; } } }catch(e){}
}
async function saveClinicsConfig(){
  if(BACKEND.enabled && BACKEND.url){
    try{ await api('saveConfig',{clinics:CLINICS,codes:CODES}); return true; }catch(e){ toast('Salvare config eșuată: '+e.message,'err'); return false; }
  }
  try{ await STORE.set(CLINICS_KEY,JSON.stringify({clinics:CLINICS,codes:CODES})); return true; }catch(e){ return false; }
}
function clinicCodeFor(name){
  // generate a simple code: first 4 letters (no diacritics) + 2026
  const base=normName(name).replace(/[^a-z]/g,'').slice(0,4)||'clin';
  let code=base+'2026', i=1;
  while(Object.values(CODES).includes(code)){ code=base+(2026)+(++i); }
  return code;
}
async function addClinic(){
  const name=prompt('Numele clinicii noi (ex: Constanța):');
  if(!name||!name.trim()) return;
  const n=name.trim();
  if(CLINICS.some(c=>normName(c)===normName(n))){ toast('Există deja o clinică cu acest nume','err'); return; }
  const code=clinicCodeFor(n);
  CLINICS.push(n); CODES[n]=code;
  await saveClinicsConfig();
  await confirmDialog('Clinică adăugată','Clinica «'+n+'» a fost adăugată.\n\nCod de acces pentru responsabil: '+code+'\n\nFolosește aceleași reguli ca celelalte clinici (program săptămânal, propagare, risc).','Am notat codul','');
  buildTabs(); highlightTab();
  if(activeTab==='dashboard'||activeTab==='cas'||activeTab==='matrix') render();
}

// Live roster = embedded master + persisted edits (fee/suma changes, additions, deletions, renames)
let ROSTER=null;
const ROSTER_KEY=STORE_PREFIX+'roster';
async function loadRoster(){
  if(ROSTER) return ROSTER;
  if(BACKEND.enabled && BACKEND.url){
    try{ const r=await api('loadRoster',{});
      if(r.roster && r.roster.length){ ROSTER=r.roster; return ROSTER; }
      // sheet roster empty: seed from embedded master and push to server (admin only)
      ROSTER=MASTER_MEDICS.map(m=>({...m}));
      if(SESSION&&SESSION.role==='central'){ try{ await api('saveRoster',{roster:ROSTER}); }catch(e){} }
      return ROSTER;
    }catch(e){ ROSTER=MASTER_MEDICS.map(m=>({...m})); return ROSTER; }
  }
  let saved=null;
  try{ const r=await STORE.get(ROSTER_KEY); if(r&&r.value) saved=JSON.parse(r.value); }catch(e){}
  ROSTER = saved || MASTER_MEDICS.map(m=>({...m}));
  return ROSTER;
}
async function saveRoster(){
  if(BACKEND.enabled && BACKEND.url){
    try{ await api('saveRoster',{roster:ROSTER}); return true; }catch(e){ toast('Salvare listă medici eșuată: '+e.message,'err'); return false; }
  }
  try{ await STORE.set(ROSTER_KEY,JSON.stringify(ROSTER)); return true; }catch(e){ return false; }
}

function fieldOpts(list, cur){
  const all=[...new Set([...(list||[]), ...(cur?[cur]:[])])].sort((a,b)=>String(a).localeCompare(String(b),'ro'));
  return '<option value="">—</option>'+all.map(x=>`<option value="${esc(x)}" ${x===cur?'selected':''}>${esc(x)}</option>`).join('');

async function setRecField(id,field,val){ await updRecrutareField(id,field,val); applyRecFilters(); }
// Data introducerii candidatului e codata in ID-ul 'r'+timestamp (ms). O extragem
// pentru afisare discreta sub nume, fara coloana separata si fara a lati randul.
function recDataAdaugare(id){
  const m=String(id||'').match(/^r(\d{10,})$/);
  if(!m) return '';
  const d=new Date(Number(m[1]));
  if(isNaN(d.getTime())) return '';
  return d.toLocaleDateString('ro-RO',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function recNameKey(s){
  return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z\s-]/g,' ').split(/[\s-]+/).filter(Boolean).sort().join(' ');
}
let REC_DUPES={byId:{},groups:[]};
function computeRecDupes(){
  const map={};
  (RECRUTARE||[]).forEach(r=>{ const k=recNameKey(r.nume); if(!k) return; (map[k]=map[k]||[]).push(r); });
  const groups=Object.values(map).filter(g=>g.length>1);
  const byId={}; groups.forEach(g=>g.forEach(r=>{ byId[r.id]=g; }));
  REC_DUPES={byId,groups};
  return REC_DUPES;
}

async function saveRename(id){
  const inp=document.getElementById('recnmin-'+id); const rec=recrutById(id);
  if(!inp||!rec) return;
  const v=inp.value.trim();
  if(!v){ toast('Numele nu poate fi gol','err'); return; }
  if(v!==rec.nume) await updRecrutareField(id,'nume',v);
  applyRecFilters();
}
async function updRecrutareField(id,field,val){
  const rec=recrutById(id); if(!rec) return;
  rec[field]=val;
  if(BACKEND.enabled && BACKEND.url){
    const fields={}; fields[field]=val;
    try{ await api('updRecrutare',{id,fields}); setStatus(true); }catch(e){ toast('Salvare eșuată: '+e.message,'err'); }
  }
}

function recrutPasses(r){
  if(RF.dubluri && !REC_DUPES.byId[r.id]) return false;
  if(RF.q){ const q=RF.q.toLowerCase(); const hay=(r.nume+' '+r.oras+' '+r.competente+' '+r.email+' '+r.telefon).toLowerCase(); if(!hay.includes(q)) return false; }
  if(RF.categorie && !String(r.categorie||'').split(',').map(s=>s.trim()).includes(RF.categorie)) return false;
  if(RF.specializare && !String(r.specializare||'').split(',').map(s=>s.trim()).includes(RF.specializare)) return false;
  if(RF.competente && !String(r.competente||'').split(',').map(s=>s.trim()).includes(RF.competente)) return false;
  if(RF.clinica && !String(r.clinica||'').split(',').map(s=>s.trim()).includes(RF.clinica)) return false;
  if(RF.judet && !String(r.judet||'').split(',').map(s=>s.trim()).includes(RF.judet)) return false;
  if(RF.status && r.status!==RF.status) return false;
  if(RF.lead && r.lead!==RF.lead) return false;
  return true;
}
function recrutSorted(list){
  const c=RSORT.col, d=RSORT.dir;
  if(c==='status'){
    // sort by pipeline stage order (RECRUT_STATUSES index), empty last
    const rank=s=>{const i=RECRUT_STATUSES.indexOf(s); return i<0?999:i;};
    return list.slice().sort((a,b)=>(rank(a.status)-rank(b.status))*d);
  }
  return list.slice().sort((a,b)=>{
    const x=String(a[c]||'').toLowerCase(), y=String(b[c]||'').toLowerCase();
    return x<y?-1*d : x>y?1*d : 0;
  });
}
function setSort(col){ if(RSORT.col===col) RSORT.dir*=-1; else {RSORT.col=col;RSORT.dir=1;} applyRecFilters(); }
function sortArrow(col){ return RSORT.col===col ? (RSORT.dir>0?' ▲':' ▼') : ''; }

// Liste de optiuni pentru filtre: nomenclator + toate valorile live din baza.
// Recalculate la fiecare aplicare a filtrelor, deci orice valoare nou introdusa
// (ex. o specializare inexistenta pana acum) devine imediat filtrabila.
function recFilterOptions(recs){
  recs = recs || RECRUTARE || [];
  const N = (typeof NOMEN!=='undefined' && NOMEN) || {};
  const ro=(a,b)=>String(a).localeCompare(String(b),'ro');
  const vals=key=>recs.flatMap(r=>String(r[key]||'').split(',').map(s=>s.trim())).filter(Boolean);
  const merge=(base,key)=>[...new Set([...(base||[]),...vals(key)])].sort(ro);
  return {
    categorii:    merge(N.categorie,'categorie'),
    specializari: merge(N.specializare,'specializare'),
    competente:   merge(N.competenta,'competente'),
    clinici:      merge([],'clinica'),
    judete:       merge([],'judet'),
    leads:        merge(N.lead,'lead'),
    statusuri:    [...RECRUT_STATUSES, ...[...new Set(vals('status'))].filter(s=>!RECRUT_STATUSES.includes(s)).sort(ro)]
  };
}
function refreshRecFilterOptions(){
  if(!document.getElementById('rfStatus')) return;
  const o=recFilterOptions();
  const set=(id,list,cur,label)=>{ const el=document.getElementById(id); if(!el) return;
    el.innerHTML='<option value="">'+label+'</option>'+list.map(x=>`<option value="${esc(x)}" ${x===cur?'selected':''}>${esc(x)}</option>`).join(''); };
  set('rfCat',o.categorii,RF.categorie,'Categorie');
  set('rfSpec',o.specializari,RF.specializare,'Specializare');
  set('rfComp',o.competente,RF.competente,'Competențe');
  set('rfClin',o.clinici,RF.clinica,'Clinică');
  set('rfJud',o.judete,RF.judet,'Județ');
  set('rfStatus',o.statusuri,RF.status,'Status');
  set('rfLead',o.leads,RF.lead,'Responsabil');
}
function applyRecFilters(){
  refreshRecFilterOptions();
  computeRecDupes();
  const recs=recrutSorted((RECRUTARE||[]).filter(recrutPasses));
  const tb=document.querySelector('#recTbl tbody');
  if(tb) tb.innerHTML = recs.map(recrutRow).join('') || `<tr><td colspan="8" style="text-align:center;color:var(--gray-mid);padding:30px">Niciun candidat pentru filtrele selectate.</td></tr>`;
  const sumEl=document.getElementById('recSummary');
  if(sumEl){
    const counts={}; REC_DUPES.groups.forEach(g=>{ counts[g.length]=(counts[g.length]||0)+1; });
    const dTot=REC_DUPES.groups.reduce((s,g)=>s+g.length,0);
    const gParts=Object.keys(counts).map(Number).sort((a,b)=>a-b).map(n=>{
      const k=counts[n];
      if(n===2) return k===1?'1 dublură':k+' dubluri';
      if(n===3) return k===1?'1 triplă':k+' triple';
      return k===1?('1 grup de '+n):(k+' grupuri de '+n);
    }).join(', ');
    const dupHtml=REC_DUPES.groups.length
      ? ` · <span class="warn-flag" style="cursor:pointer;${RF.dubluri?'font-weight:700;text-decoration:underline;':''}" onclick="toggleDupes()" title="Nume complet identic (ordinea cuvintelor și diacriticele nu contează). Click pentru a ${RF.dubluri?'reveni la toți candidații':'afișa doar candidații cu nume duplicat'}.">⚠ ${dTot} candidați cu nume duplicat: ${gParts}${RF.dubluri?' — filtru activ':''}</span>`
      : ' · <span style="color:#0f8d7c">✓ fără nume duplicate</span>';
    sumEl.innerHTML=`<b>${recs.length}</b> candidați afișați din ${(RECRUTARE||[]).length}${dupHtml}`;
  }
  const stEl=document.getElementById('recStats');
  if(stEl){
    const g={semnat:0,activ:0,inDiscutie:0,necontactat:0,refuzat:0,followup:0};
    recs.forEach(r=>{const c=RECRUT_STATUS_CLASS[r.status]||'rs-grey';
      if(r.status===FOLLOWUP_STATUS)g.followup++;
      else if(r.status==='Contract semnat'||r.status==='Precontract semnat')g.semnat++;
      else if(r.status==='Colaborare activa')g.activ++;
      else if(c==='rs-blue'||c==='rs-amber')g.inDiscutie++;
      else if(c==='rs-red')g.refuzat++;
      else g.necontactat++;
    });
    stEl.innerHTML=`
      <div class="rec-stat"><div class="rs-num" style="color:var(--accent)">${g.activ}</div><div class="rs-lbl">Colaborări active</div></div>
      <div class="rec-stat"><div class="rs-num" style="color:var(--primary)">${g.semnat}</div><div class="rs-lbl">Contracte semnate</div></div>
      <div class="rec-stat"><div class="rs-num" style="color:var(--secondary)">${g.inDiscutie}</div><div class="rs-lbl">În discuție</div></div>
      <div class="rec-stat"><div class="rs-num" style="color:var(--gray-mid)">${g.necontactat}</div><div class="rs-lbl">Necontactați</div></div>
      <div class="rec-stat"><div class="rs-num" style="color:var(--bad)">${g.refuzat}</div><div class="rs-lbl">Refuzați</div></div>
      <div class="rec-stat rec-stat-followup ${RF.status===FOLLOWUP_STATUS?'rs-active':''}" onclick="toggleFollowup()" title="Click pentru a filtra candidații cu status «Necesită follow-up»"><div class="rs-num" style="color:#fff">${g.followup}</div><div class="rs-lbl" style="color:#fff">Necesită follow-up</div></div>`;
  }
}

// Notes stored as JSON array of {d,t}. Back-compat: plain string -> single entry.
function parseNotes(r){
  const n=r.notite||'';
  if(typeof n==='string' && n.trim().startsWith('[')){ try{ const a=JSON.parse(n); return Array.isArray(a)?a:[]; }catch(e){} }
  if(typeof n==='string' && n.trim()){ return [{d:'',t:n.trim()}]; }
  return [];
}
function nowStamp(){ const d=new Date(); const p=x=>String(x).padStart(2,'0'); return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`; }
// ===== Notițe per MEDIC (același mecanism JSON ca la Recrutare, dar pe ROSTER) =====
function parseMedNotes(s){
  const n=s||'';
  if(typeof n==='string' && n.trim().startsWith('[')){ try{ const a=JSON.parse(n); return Array.isArray(a)?a:[]; }catch(e){} }
  if(typeof n==='string' && n.trim()){ return [{d:'',t:n.trim()}]; }
  return [];
}
function medNotesCount(s){ return parseMedNotes(s).length; }
let _medNoteName=null;
function openMedNotes(name){

  document.getElementById('ndSub').textContent=[m.supraspec, (m.feeRMN!=null?'RMN '+Math.round(m.feeRMN*100)+'%':''), (m.feeCT?'CT '+Math.round(m.feeCT*100)+'%':'')].filter(Boolean).join(' · ');
  drawMedNotes();

function drawMedNotes(){

async function persistMedNotes(){
  const i=rosterIdx(_medNoteName); if(i<0) return;
