  await saveRoster();
}
function medAddNote(){
  const inp=document.getElementById('ndInput'); const t=(inp.value||'').trim(); if(!t) return;
  let i=rosterIdx(_medNoteName); if(i<0){ ROSTER.push({medic:_medNoteName,feeRMN:0,feeCT:0,suma:0}); i=ROSTER.length-1; }
  const notes=parseMedNotes(ROSTER[i].notite); notes.push({d:nowStamp(),t}); ROSTER[i].notite=JSON.stringify(notes);
  inp.value=''; drawMedNotes(); persistMedNotes(); if(VIEW_MODE) applyFilters();
}
function medEditNote(k){
  const i=rosterIdx(_medNoteName); const notes=parseMedNotes(ROSTER[i].notite);
  if(!notes[k]) return; const nv=prompt('Editează notița:',notes[k].t); if(nv===null) return;
  notes[k].t=nv.trim(); ROSTER[i].notite=JSON.stringify(notes);
  drawMedNotes(); persistMedNotes(); if(VIEW_MODE) applyFilters();
}
function medDelNote(k){
  const i=rosterIdx(_medNoteName); const notes=parseMedNotes(ROSTER[i].notite);
  notes.splice(k,1); ROSTER[i].notite=JSON.stringify(notes);
  drawMedNotes(); persistMedNotes(); if(VIEW_MODE) applyFilters();
}
async function persistNotes(rec){
  if(BACKEND.enabled && BACKEND.url){
    try{ await api('updRecrutare',{id:rec.id,fields:{notite:rec.notite}}); setStatus(true); }
    catch(e){ toast('Salvare notiță eșuată: '+e.message,'err'); }
  }
}
// Save a single field (telefon/email) with a tiny check-button
function saveField(id,field,inputId,btn){
  let val=(document.getElementById(inputId)||{}).value||'';
  if(field==='telefon'){ val=fmtPhone(val); const el=document.getElementById(inputId); if(el) el.value=val; }
  const rec=recrutById(id); if(!rec) return;
  rec[field]=val;
  if(btn){ btn.textContent='✓'; btn.classList.add('isave-ok'); setTimeout(()=>btn.classList.remove('isave-ok'),1200); }
  if(BACKEND.enabled && BACKEND.url){
    const f={}; f[field]=val;
    api('updRecrutare',{id,fields:f}).then(()=>setStatus(true)).catch(e=>toast('Salvare eșuată: '+e.message,'err'));
  }

// Romanian phone: ensure leading 0 for 9-digit local numbers
function fmtPhone(p){
  let s=String(p||'').trim();
  if(!s) return '';
  const digits=s.replace(/[^\d]/g,'');
  if(digits.length===9 && !s.startsWith('0') && !s.startsWith('+')) return '0'+s;
  return s;
}

  });
  if(!vals) return;
  const nume=vals.nume;

  RECRUTARE.unshift(rec);

async function importRecrutare(input){
  const file=input.files&&input.files[0]; if(!file) return;
  const ok=await confirmDialog('Import bază recrutare','Asta va ÎNLOCUI complet baza de recrutare curentă cu datele din fișier ('+file.name+'). Continui?','Importă','Anulează');
  if(!ok){ input.value=''; return; }
  try{
    const txt=await file.text();
    let recs;
    if(/\.csv$/i.test(file.name)){ recs=csvToRecords(txt); }
    else { recs=JSON.parse(txt); }
    if(!Array.isArray(recs)) throw new Error('Format invalid');
    // ensure ids
    recs.forEach((r,i)=>{ if(!r.id) r.id='r'+(i+1); });
    RECRUTARE=recs;
    if(BACKEND.enabled && BACKEND.url){ await api('saveRecrutare',{records:recs}); }
    toast(recs.length+' candidați importați','ok');
    renderRecrutare();
  }catch(e){ toast('Import eșuat: '+e.message,'err'); }
  input.value='';
}
function csvToRecords(txt){
  const lines=txt.split(/\r?\n/).filter(Boolean);
  const head=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const cells=line.match(/("([^"]|"")*"|[^,]*)/g).filter((_,i,a)=>i<head.length);
    const rec={}; head.forEach((h,i)=>rec[h]=(cells[i]||'').replace(/^"|"$/g,'').replace(/""/g,'"'));
    return rec;
  });
}
function exportRecrutare(fmt){
  // Oglindeste exact coloanele tabelului de recrutare, in aceeasi ordine, doar randurile filtrate.
  const recs=recrutSorted((RECRUTARE||[]).filter(recrutPasses));
  const cols=['nume','specializare','grad','competente','clinica','judet','lead','telefon','email','status'];
  const head=['Nume','Specialitate','Grad','Competențe','Clinică','Județ','Lead/Responsabil','Telefon','Email','Status'];
  const rows=recs.map(r=>cols.map(c=> c==='telefon'?fmtPhone(r.telefon||''):(r[c]||'')));
  const title='Recrutare_'+new Date().toISOString().slice(0,10);
  if(fmt==='xlsx'){
    const ws=XLSX.utils.aoa_to_sheet([head,...rows]);
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Recrutare');
    XLSX.writeFile(wb,title+'.xlsx');
  }else if(fmt==='pdf'){
    exportPDF(head,rows,'Recrutare medici');

    dl(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),title+'.csv');
  }
  toast('Export '+(fmt||'csv').toUpperCase()+' generat','ok');
}


function buildMedMap(data){
  const med={};
  // seed roster (includes unassigned medics) — uses live ROSTER; master attributes are authoritative
  (ROSTER||MASTER_MEDICS).forEach(m=>{ med[m.medic]={feeRMN:(m.feeRMN!=null?m.feeRMN:m.fee)||0,feeCT:m.feeCT||0,suma:m.suma,maxSegm:m.maxSegm||0,predispozitie:m.predispozitie||'',supraspec:m.supraspec||'',beneficii:m.beneficii||'',invest:'',investVal:m.investVal||'',notite:m.notite||'',per:{},nClinici:0,nPrezent:0,warn:[]}; });
  // overlay actual clinic schedules — medics scheduled in a clinic propagate automatically into the list
  let autoAdded=[];
  for(const c of CLINICS){ for(const r of (data[c]||[])){
    if(!med[r.medic]){
      med[r.medic]={feeRMN:r.fee||0,feeCT:0,suma:r.suma||0,maxSegm:0,predispozitie:'',supraspec:'',beneficii:'',invest:'',investVal:'',notite:'',per:{},nClinici:0,nPrezent:0,warn:[]};
      autoAdded.push({medic:r.medic,feeRMN:r.fee||0,feeCT:0,suma:r.suma||0});
    }
    const m=med[r.medic];
    const band=casBand(r); m.per[c]=band; m.nPrezent++; if(band>0)m.nClinici++;
    // Inv. în fee se trage automat din clinica în care e prezent medicul (doar citire).
    if(r.invest) m.invest=r.invest;
  }}
  // persist any auto-added medics into the roster so the list stays in sync with clinic programs
  if(autoAdded.length && ROSTER){
    autoAdded.forEach(a=>{ if(!ROSTER.some(x=>x.medic===a.medic)) ROSTER.push(a); });
    if(SESSION && SESSION.role==='central'){ saveRoster(); }
  }
  // duplicate (similar-name) detection across all medic names
  const names=Object.keys(med);
  names.forEach(n=>{
    const sim=similarMedics(n,names).filter(s=>s.n!==n);
    if(sim.length) med[n].warn.push('Posibilă dublură de nume cu: '+sim.map(s=>s.n).join(', ')+'. Dacă e aceeași persoană, redenumește una dintre variante ca să fie identice.');
  });
  return med;
}

/* ===== Roster editing (Matrice) ===== */
function rosterIdx(name){ return (ROSTER||[]).findIndex(m=>m.medic===name); }
async function updRoster(name,field,val){
  let i=rosterIdx(name);
  if(i<0){ ROSTER.push({medic:name,feeRMN:0,feeCT:0,suma:0}); i=ROSTER.length-1; }
  ROSTER[i][field]=val;
  // reflect in current view map for live totals
  if(VIEW_MED[name]) VIEW_MED[name][field]=val;
  await saveRoster(); applyFilters(); setStatus(true);
}
async function renameRoster(oldName){
  const nn=prompt('Redenumește medicul:',oldName);
  if(!nn||nn.trim()===''||nn.trim()===oldName) return;
  const newName=nn.trim();
  if(rosterIdx(newName)>=0){ toast('Există deja un medic cu acest nume','err'); return; }
  let i=rosterIdx(oldName);
  if(i<0){ ROSTER.push({medic:newName,fee:VIEW_MED[oldName]?.fee||0,suma:VIEW_MED[oldName]?.suma||0}); }
  else ROSTER[i].medic=newName;
  await saveRoster();
  toast('Redenumit. Notă: dacă medicul are program în clinici sub vechiul nume, actualizează-l și acolo.','ok');
  renderMatrix();
}
async function delRoster(name){
  const active = VIEW_MED[name] && VIEW_MED[name].nClinici>0;
  const msg = active
    ? name+' are program activ în clinici.\n\nȘtergerea din listă NU elimină programul din clinici. Sigur ștergi medicul din listă?'
    : 'Sigur ștergi «'+name+'» din listă?';
  const ok = await confirmDialog('Confirmare ștergere', msg, 'Șterge', 'Anulează');
  if(!ok) return;
  const i=rosterIdx(name); if(i>=0) ROSTER.splice(i,1);
  await saveRoster(); renderMatrix();
  toast(name+' a fost șters din listă','ok');
}
async function addRosterMedic(){
  const n=document.getElementById('newRosterMedic').value.trim();
  if(!n){ toast('Introdu numele medicului','err'); return; }
  const allNames=(ROSTER||[]).map(m=>m.medic);
  if(!confirmNotDuplicate(n,allNames)) return;
  const fee=(parseFloat(document.getElementById('newRosterFee').value)||0)/100;
  const suma=parseFloat(document.getElementById('newRosterSuma').value)||0;
  ROSTER.push({medic:n,fee,suma});
  await saveRoster();
  toast('Medic adăugat în listă','ok');
  renderMatrix();
}

/* ===================== UTIL ===================== */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
// Normalize a name: lowercase, strip diacritics, collapse spaces
function normName(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();}
// Find existing medic names similar to the candidate (exact, prefix, or containment)
function similarMedics(candidate,names){
  const c=normName(candidate); if(!c) return [];
  const out=[];
  names.forEach(n=>{
    const x=normName(n);
    if(x===c) out.push({n,kind:'identic'});
    else if(x.startsWith(c)||c.startsWith(x)) out.push({n,kind:'asemănător'});
    else { // share first two words (nume+prenume)
      const cw=c.split(' ').slice(0,2).join(' '), xw=x.split(' ').slice(0,2).join(' ');
      if(cw.length>4 && cw===xw) out.push({n,kind:'asemănător'});
    }
  });
  return out;
}
// Returns true if user wants to proceed adding as NEW (after showing duplicate warning)
function confirmNotDuplicate(candidate,names){
  const sim=similarMedics(candidate,names);
  if(sim.length===0) return true;
  const list=sim.slice(0,5).map(s=>'• '+s.n+' ('+s.kind+')').join('\n');
  return confirm('Există deja medici cu nume similar:\n\n'+list+'\n\nVrei totuși să adaugi «'+candidate+'» ca medic NOU, separat?\n\n(OK = adaug nou · Anulează = renunț)');
}
let toastT;
// Dialog cu camp de text (inlocuieste window.prompt, care e blocat in iframe-uri sandbox)
function promptDialog(title,placeholder,okLabel){
  return new Promise(resolve=>{
    const ov=document.createElement('div'); ov.className='confirm-overlay show';
    ov.innerHTML=`<div class="confirm-box">
      <h3>${esc(title||'')}</h3>
      <input class="code-input" id="pdInput" placeholder="${esc(placeholder||'')}" autocomplete="off" style="font-size:14.5px;letter-spacing:0">
      <div class="confirm-actions" style="margin-top:18px">
        <button class="btn-ghost" id="pdCancel">Anulează</button>
        <button class="btn btn-primary" id="pdOk" style="width:auto;margin-top:0;padding:10px 20px">${esc(okLabel||'OK')}</button>
      </div></div>`;
    document.body.appendChild(ov);
    const inp=ov.querySelector('#pdInput');
    const done=(val)=>{ ov.remove(); resolve(val); };
    ov.querySelector('#pdOk').onclick=()=>done(inp.value.trim()||null);
    ov.querySelector('#pdCancel').onclick=()=>done(null);
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter') done(inp.value.trim()||null); if(e.key==='Escape') done(null); });
    setTimeout(()=>inp.focus(),60);
  });
}
function confirmDialog(title,message,okLabel,cancelLabel){
  return new Promise(resolve=>{
    const ov=document.getElementById('confirmOverlay');
    document.getElementById('confirmTitle').textContent=title||'Confirmare';
    document.getElementById('confirmMsg').textContent=message||'';
    const okB=document.getElementById('confirmOk'), cxB=document.getElementById('confirmCancel');
    okB.textContent=okLabel||'OK'; cxB.textContent=cancelLabel||'Anulează';
    ov.classList.add('show');
    const done=(val)=>{ ov.classList.remove('show'); okB.onclick=null; cxB.onclick=null; resolve(val); };
    okB.onclick=()=>done(true); cxB.onclick=()=>done(false);
  });
}
function toast(msg,kind){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(kind||'');
  clearTimeout(toastT);toastT=setTimeout(()=>t.className='toast',2600);}
function toastUndo(msg,btnLabel,cb){
  const t=document.getElementById('toast');
  t.innerHTML=esc(msg)+' <button id="toastAction" style="margin-left:12px;background:rgba(255,255,255,.25);color:#fff;border-radius:7px;padding:4px 12px;font-weight:600;cursor:pointer">'+esc(btnLabel)+'</button>';
  t.className='toast show';
  const b=document.getElementById('toastAction');
  if(b) b.onclick=()=>{ clearTimeout(toastT); t.className='toast'; cb(); };
  clearTimeout(toastT); toastT=setTimeout(()=>t.className='toast',5000);
}
